    \ a positional ``message`` for non-interactive runs.\n        ``output_json``\
    \ maps to ``--output-schema`` so dispatch callers can\n        request structured\
    \ output.\n\n        The integration currently does not apply ``model`` overrides\
    \ because\n        the expected config shape for ``--config-override`` is not\
    \ yet wired\n        in this adapter.\n\n        Honours the standard env-var\
    \ contract:\n          - ``SPECKIT_INTEGRATION_ROVODEV_EXECUTABLE`` overrides\
    \ ``acli``\n          - ``SPECKIT_INTEGRATION_ROVODEV_EXTRA_ARGS`` injects extra\
    \ CLI flags\n        "
