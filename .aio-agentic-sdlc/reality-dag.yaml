  description: Function test_install_url_is_set
- id: 6f4e981b-0fbc-5f4d-a52d-9425851495bb
  type: component
  name: test_build_exec_args_default_includes_headless_flags_and_json
  description: "Default argv emits the full headless flag set: -p --trust\n      \
    \  --approve-mcps --force, then prompt, then --output-format json.\n        "
- id: f479c37c-0ef1-5263-92d0-07202ce020ac
  type: component
  name: test_build_exec_args_text_output_omits_format
  description: Function test_build_exec_args_text_output_omits_format
- id: 2d524030-a55f-5c14-832a-ef02b228e630
  type: component
  name: test_build_exec_args_with_model
  description: Function test_build_exec_args_with_model
- id: a1bbcf0f-a267-53c2-9367-30a1d4e02253
  type: component
  name: test_build_exec_args_contains_mandatory_headless_flags
  description: "The four headless flags must always appear together.\n\n        ``--approve-mcps``\
    \ is required so MCP servers (e.g. dingtalk-doc)\n        actually load in headless\
    \ mode; ``--force`` is required so the\n        agent doesn't block on tool-call\
    \ approval prompts during the\n        speckit workflow.  Together with ``-p``\
    \ and ``--trust`` they\n        bring cursor-agent's headless behaviour in line\
    \ with\n        ``claude -p`` / ``codex --exec`` from spec-kit's perspective.\n\
    \        "
- id: 856e02cb-b862-5793-95d0-f7f10567d819
  type: component
  name: test_build_exec_args_supports_dispatch_without_requires_cli
  description: "``build_exec_args`` must return argv even though ``requires_cli``\n\
    \        is ``False``.\n\n        ``CursorAgentIntegration`` opts out of the ``requires_cli``\
    \ hard\n        precheck (so ``specify init`` doesn't fail when the CLI isn't\
    \ on\n        PATH) but still supports workflow dispatch.  The presence of a\n\
    \        non-``None`` argv from ``build_exec_args()`` is what the engine\n   \
    \     keys off \u2014 pin that invariant.\n        "
- id: a868c1b9-cf92-57b9-8206-c9c82aadb224
  type: component
  name: test_build_command_invocation_uses_hyphenated_skill_name
  description: 'SkillsIntegration: /speckit-plan (not /speckit.plan).'
- id: add03fbd-337a-5820-8201-5811a17b9d9e
  type: component
  name: test_dispatch_command_resolves_cmd_shim_for_subprocess
  description: "``.cmd`` shims must be resolved to their full path before ``subprocess.run``.\n\
    \n        ``cursor-agent`` (and other npm-installed CLIs on Windows) ship as\n\
    \        ``cursor-agent.cmd`` wrappers.  ``shutil.which`` honors ``PATHEXT``\n\
    \        and finds them, but Python's ``subprocess.run`` calls\n        ``CreateProcess``\
    \ which does **not** consult ``PATHEXT`` and fails\n        with ``WinError 2``\
    \ on a bare ``[\"cursor-agent\", ...]`` argv.  The\n        fix in ``base.py::dispatch_command``\
    \ resolves ``exec_args[0]`` via\n        ``shutil.which`` so the full ``.cmd``\
    \ path is what reaches\n        ``CreateProcess``.\n        "
- id: 997e84cf-90f2-56c5-b5f3-dac7189a2486
  type: component
  name: test_dispatch_command_passthrough_when_shutil_which_finds_nothing
  description: "If ``shutil.which`` returns ``None``, leave argv unchanged so the\n\
    \        existing ``FileNotFoundError`` path remains observable to callers."
