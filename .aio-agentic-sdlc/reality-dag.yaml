- id: 5f6c7c86-b275-5419-96fd-a1a32f0fb815
  type: component
  name: TestSpeckitManifestRecordsSkippedFiles
  description: "Regression test for issue #2107.\n\n    ``install_shared_infra`` must\
    \ record every shared-infrastructure file\n    under ``.specify/`` in ``speckit.manifest.json``,\
    \ including files that\n    were *skipped* because they already existed on disk\
    \ and ``force=False``.\n\n    Before the fix, the skip branches in the scripts\
    \ and templates loops\n    appended to ``skipped_files`` without calling ``manifest.record_existing``.\n\
    \    So when ``install_shared_infra`` ran with a fresh (or lost) manifest\n  \
    \  against an already-populated ``.specify/`` tree, every file went down the\n\
    \    skip path, ``planned_copies`` and ``planned_templates`` stayed empty, and\n\
    \    ``manifest.save()`` wrote an empty ``files`` field \u2014 leaving the\n \
    \   integration believing nothing was installed.\n\n    Reproduction (without\
    \ the fix) using ``install_shared_infra`` directly:\n\n        install_shared_infra(p,\
    \ \"sh\", ..., force=False)   # 1st run \u2192 10 files\n        (p / \".specify/integrations/speckit.manifest.json\"\
    ).unlink()\n        install_shared_infra(p, \"sh\", ..., force=False)   # 2nd\
    \ run \u2192 0 files\n                                                       \
    \   # ^^ BUG: empty\n    "
- id: 8f4ce535-4556-5ad6-acdf-83c63a0720d9
  type: component
  name: test_install_shared_infra_records_skipped_files
  description: "With ``force=False`` and ``.specify/`` already populated, the\n  \
    \      manifest must still record every file \u2014 the skip branches are not\n\
    \        allowed to drop files from the manifest."
- id: efe6a27f-10d3-52f7-985d-3f2b84537940
  type: component
  name: test_install_shared_infra_handles_directory_at_script_destination
  description: "A non-file (directory) at a script's destination must NOT crash\n\
    \        ``install_shared_infra`` and must NOT be recorded in the manifest \u2014\
    \n        the path still appears in the user-visible skipped-paths warning.\n\
    \        "
- id: c7a145e6-4960-5169-a1e3-79c8de7cae0e
  type: component
  name: test_install_shared_infra_handles_directory_at_template_destination
  description: "Symmetric coverage for the templates loop: a directory at a\n    \
    \    template's destination must NOT crash install nor be recorded."
