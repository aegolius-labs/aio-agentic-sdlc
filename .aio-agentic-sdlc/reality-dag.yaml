    \  Extension command files are tracked per agent in ``registered_commands``.\n\
    \        Extension skills are scoped to the provided *agent_name*; they are removed\n\
    \        from that agent's skills directory (resolved via its integration config)\n\
    \        and the registry field is cleared.\n\n        Skips cleanup when *agent_name*\
    \ is not a supported agent to avoid\n        losing registry entries while leaving\
    \ orphaned files on disk.\n        "
- id: 29f41c32-b797-529e-ab48-42c48f7fd5b7
  type: component
  name: register_enabled_extensions_for_agent
  description: "Register installed, enabled extensions for ``agent_name``.\n\n   \
    \     This is intended to be called after switching integrations. Command\n  \
    \      registration is scoped to the explicit ``agent_name`` argument, but some\n\
    \        behavior still depends on the current init-options state (for example,\n\
    \        skills-mode handling uses the active ``ai`` / ``ai_skills`` settings).\n\
    \n        Callers should therefore pass the agent that has just been made active\n\
    \        in init-options; in normal use, ``agent_name`` is expected to match the\n\
    \        current ``ai`` value. This mirrors extension install behavior while\n\
    \        avoiding stale default-mode command directories when that active agent\n\
    \        is running in skills mode (notably Copilot ``--skills``).\n        "
