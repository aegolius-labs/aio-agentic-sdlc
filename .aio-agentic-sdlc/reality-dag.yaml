- id: 68772d2a-78e2-50d5-b1e7-da6091a59584
  type: component
  name: PromptStep
  description: "Send a free-form prompt to an integration CLI.\n\n    Unlike ``CommandStep``\
    \ which invokes an installed Spec Kit command\n    by name (e.g. ``/speckit.specify``\
    \ or ``/speckit-specify``),\n    ``PromptStep`` sends an arbitrary inline ``prompt:``\
    \ string\n    directly to the CLI.  This is useful for ad-hoc instructions\n \
    \   that don't map to a registered command.\n\n    .. note::\n\n        CLI output\
    \ is streamed to the terminal for live progress.\n        ``output.exit_code``\
    \ is always captured and can be referenced\n        by later steps.  Full response\
    \ text capture is a planned\n        enhancement.\n\n    Example YAML::\n\n  \
    \      - id: review-security\n          type: prompt\n          prompt: \"Review\
    \ {{ inputs.file }} for security vulnerabilities\"\n          integration: claude\n\
    \    "
