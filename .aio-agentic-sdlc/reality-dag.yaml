  type: component
  name: SymlinkedSharedPathError
  description: "Raised when a shared infrastructure path or ancestor is a symlink.\n\
    \n    Distinct from other unsafe-path errors so callers can preserve symlinked\n\
    \    destinations as customizations while still letting genuine safety errors\n\
    \    (e.g. path escape, not-a-directory) propagate and abort the operation.\n\
    \    "
