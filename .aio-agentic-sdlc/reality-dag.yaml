    \ ``~/.hermes/skills/`` (user home directory)\n    rather than a project-local\
    \ path.  Skills are installed directly to\n    the global directory \u2014 no\
    \ project-local copies are created since\n    Hermes discovers them globally.\
    \  A project-local marker directory\n    (``.hermes/skills/`` empty) is created\
    \ so extension commands (e.g.\n    git) can detect Hermes as an active integration.\
    \  Uninstall removes\n    both the marker and all global ``speckit-*`` skills,\
    \ matching the\n    standard integration teardown behaviour.\n    "
- id: b21e9182-3668-553c-9944-67713bb3f1ba
  type: component
  name: options
  description: Function options
- id: 71af6cc4-0c43-5ba9-8929-a7140f0ce10a
  type: component
  name: setup
  description: "Install command templates as global Hermes skills.\n\n        Writes\
    \ each skill directly to\n        ``~/.hermes/skills/speckit-<name>/SKILL.md``\
    \ where Hermes\n        discovers them at runtime.  No project-local SKILL.md\
    \ copies are\n        created \u2014 the global directory is the single source\
    \ of truth.\n        A project-local marker (``.hermes/skills/`` empty) is created\n\
    \        so extension commands (e.g. git) can detect Hermes as an active\n   \
    \     integration.\n        "
- id: 3d4c59c2-b508-51e3-a287-bd9023650134
  type: component
  name: teardown
  description: "Uninstall integration files including global Hermes skills.\n\n  \
    \      Removes the managed context section from AGENTS.md, removes the\n     \
    \   project-local marker directory (if empty), delegates to\n        ``manifest.uninstall()``\
    \ for project-local tracked files, and\n        removes all ``speckit-*`` skills\
    \ under ``~/.hermes/skills/``.\n\n        Global skills are always removed on\
    \ teardown \u2014 this matches the\n        standard integration behaviour where\
    \ all files created by the\n        integration are removed on ``specify integration\
    \ uninstall``.\n        "
- id: 548a44ed-8812-5d79-b553-0c5ee17e6abf
  type: component
  name: build_exec_args
  description: "Build Hermes CLI invocation for programmatic dispatch.\n\n       \
    \ Uses ``hermes chat -Q -q`` for one-shot queries in quiet mode,\n        mapping\
    \ slash-command invocations to the appropriate skill-based\n        dispatch.\n\
    \        "
