  type: component
  name: CommandStep
  description: "Default step type \u2014 invokes a Spec Kit command via the integration\
    \ CLI.\n\n    The command files (skills, markdown, TOML) are already installed\
    \ in\n    the integration's directory on disk.  This step tells the CLI to\n \
    \   execute the command by name (e.g. ``/speckit.specify`` or\n    ``/speckit-specify``)\
    \ rather than reading the file contents.\n\n    .. note::\n\n        CLI output\
    \ is streamed to the terminal for live progress.\n        ``output.exit_code``\
    \ is always captured and can be referenced\n        by later steps (e.g. ``{{\
    \ steps.specify.output.exit_code }}``).\n        Full ``stdout``/``stderr`` capture\
    \ is a planned enhancement.\n    "
