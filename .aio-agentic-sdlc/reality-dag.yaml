- id: 898f07ba-9e24-55a6-a16c-6ac78b245381
  type: component
  name: get_pack
  description: "Get manifest for an installed preset.\n\n        Args:\n         \
    \   pack_id: Preset ID\n\n        Returns:\n            Preset manifest or None\
    \ if not installed\n        "
- id: f439f5a6-189c-5a8d-b803-be5e68e0f503
  type: component
  name: PresetCatalog
  description: "Manages preset catalog fetching, caching, and searching.\n\n    Supports\
    \ multi-catalog stacks with priority-based resolution,\n    mirroring the extension\
    \ catalog system.\n    "
- id: f5f1db60-8740-56b6-84f6-fb35b0a8f514
  type: component
  name: __init__
  description: "Initialize preset catalog manager.\n\n        Args:\n            project_root:\
    \ Root directory of the spec-kit project\n        "
- id: 26ed9b8c-4f04-5c9c-a8d4-5582095a8342
  type: component
  name: get_active_catalogs
  description: "Get the ordered list of active preset catalogs.\n\n        Resolution\
    \ order:\n        1. SPECKIT_PRESET_CATALOG_URL env var \u2014 single catalog\
    \ replacing all defaults\n        2. Project-level .specify/preset-catalogs.yml\n\
    \        3. User-level ~/.specify/preset-catalogs.yml\n        4. Built-in default\
    \ stack (default + community)\n\n        Returns:\n            List of PresetCatalogEntry\
    \ objects sorted by priority (ascending)\n\n        Raises:\n            PresetValidationError:\
    \ If a catalog URL is invalid\n        "
- id: 5c6b696c-ee70-5088-9ff5-3fac2bf57174
  type: component
  name: get_catalog_url
  description: "Get the primary catalog URL.\n\n        Returns the URL of the highest-priority\
    \ catalog. Kept for backward\n        compatibility. Use get_active_catalogs()\
    \ for full multi-catalog support.\n\n        Returns:\n            URL of the\
    \ primary catalog\n        "
- id: b0676aa9-0b8b-5b4b-a9fe-ea6ea69856f9
  type: component
  name: is_cache_valid
  description: "Check if cached catalog is still valid.\n\n        Returns ``False``\
    \ for any read/decoding failure on the metadata\n        file (missing fields,\
    \ malformed JSON, permissions / disk errors,\n        wrong text encoding) so\
    \ callers fall through to a network refetch\n        instead of crashing. Treating\
    \ cache validity as best-effort\n        matches the contract used by ``_is_url_cache_valid``\
    \ above.\n\n        Returns:\n            True if cache exists and is within cache\
    \ duration\n        "
- id: 1047512b-8fb4-5d28-96db-0b2490e9f191
  type: component
  name: fetch_catalog
  description: "Fetch preset catalog from URL or cache.\n\n        Args:\n       \
    \     force_refresh: If True, bypass cache and fetch from network\n\n        Returns:\n\
    \            Catalog data dictionary\n\n        Raises:\n            PresetError:\
    \ If catalog cannot be fetched\n        "
- id: a22a245e-1f81-5083-8bbb-09b0dd8fddca
  type: component
  name: search
  description: "Search catalog for presets.\n\n        Searches across all active\
    \ catalogs (merged by priority) so that\n        community and custom catalogs\
    \ are included in results.\n\n        Args:\n            query: Search query (searches\
    \ name, description, tags)\n            tag: Filter by specific tag\n        \
    \    author: Filter by author name\n\n        Returns:\n            List of matching\
    \ preset metadata\n        "
- id: 2d2fdbf0-c0f3-5066-8268-074c4c22c2ef
  type: component
  name: get_pack_info
  description: "Get detailed information about a specific preset.\n\n        Searches\
    \ across all active catalogs (merged by priority).\n\n        Args:\n        \
    \    pack_id: ID of the preset\n\n        Returns:\n            Pack metadata\
    \ or None if not found\n        "
- id: 05bb7537-cf57-594c-b650-033eea56e008
  type: component
  name: download_pack
  description: "Download preset ZIP from catalog.\n\n        Args:\n            pack_id:\
    \ ID of the preset to download\n            target_dir: Directory to save ZIP\
    \ file (defaults to cache directory)\n\n        Returns:\n            Path to\
    \ downloaded ZIP file\n\n        Raises:\n            PresetError: If pack not\
    \ found or download fails\n        "
- id: 74d310f4-e784-5ad6-9906-a56f2241a154
  type: component
  name: clear_cache
  description: Clear all catalog cache files, including per-URL hashed caches.
- id: ca73deaa-1bdf-59a5-adb1-85c50dbb21ac
  type: component
  name: PresetResolver
  description: "Resolves template names to file paths using a priority stack.\n\n\
    \    Resolution order:\n    1. .specify/templates/overrides/          - Project-local\
    \ overrides\n    2. .specify/presets/<preset-id>/          - Installed presets\n\
    \    3. .specify/extensions/<ext-id>/templates/ - Extension-provided templates\n\
    \    4. .specify/templates/                    - Core templates (shipped with\
    \ Spec Kit)\n    "
- id: d1a74843-16e1-5102-ba1e-1fa7a7fa0792
  type: component
  name: __init__
  description: "Initialize preset resolver.\n\n        Args:\n            project_root:\
    \ Path to project root directory\n        "
- id: 7f59261d-d24a-514f-a9ce-6fe4e7633fae
  type: component
  name: resolve
  description: "Resolve a template name to its file path.\n\n        Walks the priority\
    \ stack and returns the first match.\n\n        Args:\n            template_name:\
    \ Template name (e.g., \"spec-template\")\n            template_type: Template\
    \ type (\"template\", \"command\", or \"script\")\n            skip_presets: When\
    \ True, skip tier 2 (installed presets). Use\n                resolve_core() as\
    \ the preferred caller-facing API for this.\n\n        Returns:\n            Path\
    \ to the resolved template file, or None if not found\n        "
- id: 8bc30eb3-a5b1-5eb5-9db5-6534582934a3
  type: component
  name: resolve_core
  description: "Resolve while skipping installed presets (tier 2).\n\n        Searches\
    \ tiers 1, 3, 4, and 5 (bundled core_pack / repo-root fallback).\n        Use\
    \ when resolving {CORE_TEMPLATE} to guarantee the result is actual\n        base\
    \ content, never another preset's wrap output.\n        "
- id: 121cf9f3-2ff0-544e-8786-326ac1780d31
  type: component
  name: resolve_extension_command_via_manifest
  description: "Resolve an extension command by consulting installed extension manifests.\n\
    \n        Walks installed extension directories in priority order, loads each\n\
    \        extension.yml via ExtensionManifest, and looks up the command by its\n\
    \        declared name to find the actual file path.  This is necessary because\n\
    \        the manifest's ``provides.commands[].file`` field is authoritative and\n\
    \        may differ from the command name\n        (e.g. ``speckit.selftest.extension``\
    \ \u2192 ``commands/selftest.md``).\n\n        Returns None if no manifest maps\
    \ the given command name, so the caller\n        can fall back to the name-based\
    \ lookup.\n        "
- id: 1fbd57e6-332d-5953-957b-becfa235a513
  type: component
  name: resolve_with_source
  description: "Resolve a template name and return source attribution.\n\n       \
    \ Args:\n            template_name: Template name (e.g., \"spec-template\")\n\
    \            template_type: Template type (\"template\", \"command\", or \"script\"\
    )\n\n        Returns:\n            Dictionary with 'path' and 'source' keys, or\
    \ None if not found\n        "
- id: 1bb69e90-e176-5dd1-b181-19745dbb530d
  type: component
  name: collect_all_layers
  description: "Collect all layers in the priority stack for a template.\n\n     \
    \   Returns layers from highest priority (checked first) to lowest priority.\n\
    \        Each layer is a dict with 'path', 'source', and 'strategy' keys.\n\n\
    \        Args:\n            template_name: Template name (e.g., \"spec-template\"\
    )\n            template_type: Template type (\"template\", \"command\", or \"\
    script\")\n\n        Returns:\n            List of layer dicts ordered highest-to-lowest\
    \ priority.\n        "
- id: 52b43ad3-edc6-5a2c-9342-08b9aecfc414
  type: component
  name: resolve_content
  description: "Resolve a template name and return composed content.\n\n        Walks\
    \ the priority stack and composes content using strategies:\n        - replace\
    \ (default): highest-priority content wins entirely\n        - prepend: content\
    \ is placed before lower-priority content\n        - append: content is placed\
    \ after lower-priority content\n        - wrap: content contains {CORE_TEMPLATE}\
    \ placeholder replaced\n                with lower-priority content (or $CORE_SCRIPT\
    \ for scripts)\n\n        Composition is recursive \u2014 multiple composing presets\
    \ chain.\n\n        Args:\n            template_name: Template name (e.g., \"\
    spec-template\")\n            template_type: Template type (\"template\", \"command\"\
    , or \"script\")\n\n        Returns:\n            Composed content string, or\
    \ None if not found\n        "
