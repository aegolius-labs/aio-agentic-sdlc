    \            priority: Resolution priority (lower = higher precedence, default\
    \ 10)\n            force: If True and extension is already installed, remove it\
    \ first\n                   before proceeding with installation\n\n        Returns:\n\
    \            Installed extension manifest\n\n        Raises:\n            ValidationError:\
    \ If manifest is invalid or priority is invalid\n            CompatibilityError:\
