- id: b2a85ff5-c45a-516e-8127-d4c4e5166c0f
  type: component
  name: TestContextRunId
  description: End-to-end tests for `{{ context.run_id }}` in workflow YAML.
- id: 1e1b90f5-ebe5-5e1c-9762-5e351071db33
  type: component
  name: test_shell_run_resolves_run_id
  description: "`run: \"echo {{ context.run_id }}\"` substitutes the\n        engine-assigned\
    \ run id into the spawned shell, and the\n        same value appears on `state.run_id`.\n\
    \        "
- id: dcef1ea0-c2ef-54e0-ade3-c0df382eb669
  type: component
  name: test_command_input_args_resolves_run_id
  description: "`input.args: \"{{ context.run_id }}\"` is resolved by\n        `CommandStep`\
    \ and recorded in step output, even when CLI\n        dispatch is unavailable\
    \ (no integration installed). Covers\n        the artifact-metadata use case from\
    \ the issue.\n        "
- id: 895ffdab-74dc-543e-a98a-de59d453a792
  type: component
  name: test_switch_expression_matches_on_run_id
  description: "`switch` over `{{ context.run_id }}` matches against case\n      \
    \  keys, and the nested branch can ALSO reference\n        `{{ context.run_id\
    \ }}`. Demonstrates the run id is a\n        first-class value in the expression\
    \ engine (not just a\n        string-interpolation token) AND that it propagates\
    \ into\n        nested step execution via the recursive `_execute_steps`\n   \
    \     traversal.\n        "
- id: 65a6f9ee-c1b3-533f-a0d5-70e7333d2063
  type: component
  name: test_workflow_without_context_reference_unchanged
  description: "Workflows that do not reference `{{ context.run_id }}`\n        continue\
    \ to run exactly as before. Locks the byte-equivalent\n        default required\
    \ by the issue's acceptance criteria.\n        "
- id: 7e2003a5-4221-5437-bc65-e2fb1c52c379
  type: component
  name: test_run_id_uses_speckit_workflow_run_id_env_override
  description: When no run_id argument is provided, SPECKIT_WORKFLOW_RUN_ID overrides
    the auto-generated run ID.
- id: fd67474c-0e81-55b6-8e24-b01565d48ad6
  type: component
  name: test_run_id_arg_takes_precedence_over_env_override
  description: Explicit run_id keeps existing precedence over SPECKIT_WORKFLOW_RUN_ID.
- id: f9439e49-535d-5cac-879b-22953c864ed6
  type: component
  name: TestContinueOnError
  description: Test the `continue_on_error` step-level field.
- id: 4cd733e0-6137-5648-b439-983e9aea8df4
  type: component
  name: test_undeclared_failure_halts_run
  description: "Default behaviour (no `continue_on_error`): a failing step\n     \
    \   halts the workflow run with `status == StepStatus.FAILED`.\n\n        Locks\
    \ the byte-equivalent default \u2014 workflows that do not\n        declare the\
    \ flag must behave exactly as before this feature.\n        "
- id: 6a607e6b-4463-5910-a507-f155fcf7543d
  type: component
  name: test_declared_and_fired_continues_run
  description: "`continue_on_error: true` + failing step: the run keeps\n        going,\
    \ the failed step's result is recorded, and the\n        downstream step runs.\n\
    \        "
- id: ee0df38c-8ac7-5b6a-a87c-794ce134ba2a
  type: component
  name: test_declared_but_step_succeeded_is_noop
  description: "`continue_on_error: true` on a step that succeeds is a\n        no-op\
    \ \u2014 the flag only changes behaviour on StepStatus.FAILED status.\n      \
    \  "
- id: 2067666d-a966-56d9-a8df-a4af0c154149
  type: component
  name: test_if_branch_routes_around_failure
  description: "End-to-end: `continue_on_error` + `if` cleanly routes around\n   \
    \     a failure. The recovery branch runs; the success branch does\n        not.\n\
    \n        Mirrors the canonical usage pattern from the original feature\n    \
    \    discussion in issue #2591.\n        "
- id: e2db07e4-7a06-56b3-9a47-f1bc09345d6f
  type: component
  name: test_gate_abort_still_halts_with_continue_on_error
  description: "`continue_on_error` does NOT override a deliberate gate\n        abort.\
    \ `output.aborted` always halts the run with\n        `status == ABORTED`.\n\n\
    \        Aborts are explicit operator decisions; continue_on_error\n        is\
    \ for transient/expected step failures only.\n        "
- id: 49f68a70-c6ea-599b-9ae5-c3157ce8ee9d
  type: component
  name: test_validation_rejects_non_bool_continue_on_error
  description: "`continue_on_error` must be a literal boolean; coerced\n        strings\
    \ like `\"true\"` are rejected at validation time so\n        authoring mistakes\
    \ surface before execution.\n        "
- id: f423c4d5-ad7f-543a-bd83-8e96551b50dc
  type: component
  name: test_validation_accepts_bool_continue_on_error
  description: Boolean values pass validation cleanly.
- id: cce2f83e-32d9-5bb3-ae0c-fc9b8f7954ee
  type: component
  name: test_engine_ignores_truthy_non_bool_continue_on_error
  description: "Defense-in-depth: even if a caller bypasses\n        `validate_workflow()`\
    \ and feeds the engine a definition with\n        `continue_on_error: \"true\"\
    ` (a string), the engine must NOT\n        honour the flag \u2014 only a literal\
    \ boolean enables the\n        behaviour. `WorkflowEngine.execute()` does not\
    \ auto-validate\n        (the `WorkflowEngine.load_workflow` docstring explicitly\n\
    \        notes the definition is \"not yet validated; call\n        `validate_workflow()`\
    \ or `engine.validate()` separately\"),\n        so the engine guards against\
    \ truthy non-bool values itself\n        via an identity check rather than truthiness.\n\
    \        "
- id: 17192b64-e550-594c-a911-7cb119a46bc3
  type: component
  name: TestRunState
  description: Test RunState persistence and loading.
- id: f28c4582-5b30-54bb-845e-c795659e68aa
  type: component
  name: test_save_and_load
  description: Function test_save_and_load
- id: 2a357305-b035-513e-a09c-209b9d033a10
  type: component
  name: test_load_not_found
  description: Function test_load_not_found
- id: d232ee17-c619-517d-aa3f-d6306dd9b9fe
  type: component
  name: test_load_rejects_path_traversal
  description: "``RunState.load`` validates ``run_id`` before touching the\n     \
    \   filesystem.\n\n        Without this guard, a value like ``../escape`` passed\
    \ via\n        ``specify workflow resume`` would interpolate path-traversal\n\
    \        segments into the lookup path. ``state_path.exists()`` would\n      \
    \  probe arbitrary paths the process can read (a file-existence\n        oracle)\
    \ and ``json.load`` would happily parse attacker-planted\n        JSON from outside\
    \ ``.specify/workflows/runs/``. The check must\n        fire *before* the path\
    \ is built \u2014 ``__init__``'s identical\n        regex on ``state_data[\"run_id\"\
    ]`` fires too late.\n        "
- id: 31593a25-92a7-5366-beff-65f9f2b51d87
  type: component
  name: test_init_and_load_share_validation
  description: "``__init__`` *and* ``load`` reject the same malformed IDs.\n\n   \
    \     The two entry points must stay in sync \u2014 drift would let an ID\n  \
    \      slip in via one path that the other would reject, producing\n        confusing\
    \ crashes mid-workflow. The previous version of this\n        test only exercised\
    \ ``__init__`` and ``_validate_run_id`` (the\n        shared helper), so a regression\
    \ in ``load`` \u2014 e.g. someone\n        deleting the ``cls._validate_run_id(run_id)``\
    \ call there \u2014 could\n        slip through despite ``__init__`` and the helper\
    \ staying\n        aligned. We now hit ``load`` directly with the same vector\
    \ so\n        any drift between the two call sites is caught by this test.\n \
    \       "
