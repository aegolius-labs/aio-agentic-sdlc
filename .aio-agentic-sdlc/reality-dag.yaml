  description: "Build CLI arguments for non-interactive execution.\n\n        Returns\
    \ a list of command-line tokens that will execute *prompt*\n        non-interactively\
    \ using this integration's CLI tool, or ``None``\n        if the integration does\
    \ not support CLI dispatch.\n\n        Subclasses for CLI-based integrations should\
    \ override this.\n        "
- id: c05ce2bb-c2ef-5b49-a2ad-132a144f1aa1
  type: component
  name: build_command_invocation
  description: "Build the native slash-command invocation for a Spec Kit command.\n\
    \n        The CLI tools discover and execute commands from installed files\n \
    \       on disk.  This method builds the invocation string the CLI\n        expects\
    \ \u2014 e.g. ``\"/speckit.specify my-feature\"`` for markdown\n        agents\
    \ or ``\"/speckit-specify my-feature\"`` for skills agents.\n\n        *command_name*\
    \ may be a full dotted name like\n        ``\"speckit.specify\"``, an extension\
    \ command like\n        ``\"speckit.git.commit\"``, or a bare stem like ``\"specify\"\
    ``.\n        "
- id: 7895387b-5f61-5524-804f-b068352ef46c
  type: component
  name: dispatch_command
  description: "Dispatch a Spec Kit command through this integration's CLI.\n\n  \
    \      By default this builds a slash-command invocation with\n        ``build_command_invocation()``\
    \ and passes that prompt to\n        ``build_exec_args()`` to construct the CLI\
    \ command line.\n        Integrations with custom dispatch behavior can override\n\
    \        ``build_command_invocation()``, ``build_exec_args()``, or\n        ``dispatch_command()``\
    \ directly.\n\n        When *stream* is ``True`` (the default), stdout and stderr\
    \ are\n        piped directly to the terminal so the user sees live output.\n\
    \        When ``False``, output is captured and returned in the dict.\n\n    \
    \    Returns a dict with ``exit_code``, ``stdout``, and ``stderr``.\n        Raises\
    \ ``NotImplementedError`` if the integration does not\n        support CLI dispatch.\n\
    \        "
- id: 9d51e5a4-99bc-5742-8487-bd11a636f602
  type: component
  name: shared_commands_dir
  description: "Return path to the shared command templates directory.\n\n       \
    \ Checks ``core_pack/commands/`` (wheel install) first, then\n        ``templates/commands/``\
    \ (source checkout).  Returns ``None``\n        if neither exists.\n        "
- id: c9ba34b4-cb21-5f4e-a84b-c0b1bbf003ea
  type: component
  name: shared_templates_dir
  description: "Return path to the shared page templates directory.\n\n        Contains\
    \ ``vscode-settings.json``, ``spec-template.md``, etc.\n        Checks ``core_pack/templates/``\
    \ then ``templates/``.\n        "
- id: 74f952bd-d18a-5c48-9e42-fb0c3adb5606
  type: component
  name: list_command_templates
  description: Return ordered list of command template files from the shared directory.
- id: d318b4d5-116a-5ea4-89a4-733b22356a8e
  type: component
  name: command_filename
  description: "Return the destination filename for a command template.\n\n      \
    \  *template_name* is the stem of the source file (e.g. ``\"plan\"``).\n     \
    \   Default: ``speckit.{template_name}.md``.  Subclasses override\n        to\
    \ change the extension or naming convention.\n        "
- id: b212d5b4-b1e3-5a51-8fcb-a98679bd6725
  type: component
  name: commands_dest
  description: "Return the absolute path to the commands output directory.\n\n   \
    \     Derived from ``config[\"folder\"]`` and ``config[\"commands_subdir\"]``.\n\
    \        Raises ``ValueError`` if ``config`` or ``folder`` is missing.\n     \
    \   "
- id: cb422914-2335-5394-ac59-fc7a7b0fcb9a
  type: component
  name: copy_command_to_directory
  description: "Copy a command template to *dest_dir* with the given *filename*.\n\
    \n        Creates *dest_dir* if needed.  Returns the absolute path of the\n  \
    \      written file.  The caller can post-process the file before\n        recording\
    \ it in the manifest.\n        "
- id: a20cfa94-faa1-5462-9c3e-01bf0ba46b43
  type: component
  name: record_file_in_manifest
  description: "Hash *file_path* and record it in *manifest*.\n\n        *file_path*\
    \ must be inside *project_root*.\n        "
- id: 5ce361b4-2c9d-5bda-95ce-be11457692c6
  type: component
  name: write_file_and_record
  description: "Write *content* to *dest*, hash it, and record in *manifest*.\n\n\
    \        Creates parent directories as needed.  Writes bytes directly to\n   \
    \     avoid platform newline translation (CRLF on Windows).  Any\n        ``\\\
    r\\n`` sequences in *content* are normalised to ``\\n`` before\n        writing.\
    \  Returns *dest*.\n        "
- id: 20767846-07b6-5d43-b341-fc9298b934f1
  type: component
  name: integration_scripts_dir
  description: "Return path to this integration's bundled ``scripts/`` directory.\n\
    \n        Looks for a ``scripts/`` sibling of the module that defines the\n  \
    \      concrete subclass (not ``IntegrationBase`` itself).\n        Returns ``None``\
    \ if the directory doesn't exist.\n        "
- id: 3064d4e9-8b05-5a03-b8e9-a0a8c5e91fb2
  type: component
  name: install_scripts
  description: "Copy integration-specific scripts into the project.\n\n        Copies\
    \ files from this integration's ``scripts/`` directory to\n        ``.specify/integrations/<key>/scripts/``\
    \ in the project.  Shell\n        scripts are made executable.  All copied files\
    \ are recorded in\n        *manifest*.\n\n        Returns the list of files created.\n\
    \        "
- id: 19e0dda8-6826-5f7b-88cc-8a0f0068f706
  type: component
  name: upsert_context_section
  description: "Create or update the managed section in the agent context file.\n\n\
    \        If the context file does not exist it is created with just the\n    \
    \    managed section.  If it exists, the content between the configured\n    \
    \    start/end markers (default ``<!-- SPECKIT START -->`` /\n        ``<!-- SPECKIT\
    \ END -->``) is replaced, or appended when no markers\n        are found. Markers\
    \ are read from the agent-context extension config\n        (``.specify/extensions/agent-context/agent-context-config.yml``)\n\
    \        when present, falling back to the class-level constants.\n\n        Returns\
    \ the path to the context file, or ``None`` when\n        ``context_file`` is\
    \ not set or the ``agent-context`` extension is\n        disabled.\n        "
- id: fe3eb89b-4351-52a6-8c8d-9e681dac4edf
  type: component
  name: remove_context_section
  description: "Remove the managed section from the agent context file.\n\n      \
    \  Returns ``True`` if the section was found and removed.  If the\n        file\
    \ becomes empty (or whitespace-only) after removal it is deleted.\n        Markers\
    \ are read from the agent-context extension config\n        (``.specify/extensions/agent-context/agent-context-config.yml``)\n\
    \        when present, falling back to the class-level constants.\n        "
- id: 58487e67-c730-5d0e-a1ed-738943ce4720
  type: component
  name: resolve_command_refs
  description: "Replace ``__SPECKIT_COMMAND_<NAME>__`` placeholders with invocations.\n\
    \n        Each placeholder encodes a command name in upper-case with\n       \
    \ underscores (e.g. ``__SPECKIT_COMMAND_PLAN__``,\n        ``__SPECKIT_COMMAND_GIT_COMMIT__``).\
    \  The replacement uses\n        *separator* to join the segments:\n\n       \
    \ * ``separator=\".\"`` \u2192 ``/speckit.plan``, ``/speckit.git.commit``\n  \
    \      * ``separator=\"-\"`` \u2192 ``/speckit-plan``, ``/speckit-git-commit``\n\
    \        "
- id: 9421b732-143f-5b29-b068-3b0cd4f91750
  type: component
  name: process_template
  description: "Process a raw command template into agent-ready content.\n\n     \
    \   Performs the same transformations as the release script:\n        1. Extract\
    \ ``scripts.<script_type>`` value from YAML frontmatter\n        2. Replace ``{SCRIPT}``\
    \ with the extracted script command\n        3. Strip ``scripts:`` section from\
    \ frontmatter\n        4. Replace ``{ARGS}`` and ``$ARGUMENTS`` with *arg_placeholder*\n\
    \        5. Replace ``__AGENT__`` with *agent_name*\n        6. Replace ``__CONTEXT_FILE__``\
    \ with *context_file*\n        7. Rewrite paths: ``scripts/`` \u2192 ``.specify/scripts/``\
    \ etc.\n        8. Replace ``__SPECKIT_COMMAND_<NAME>__`` with invocation strings\n\
    \        "
- id: cf4997e9-4b9c-5dbc-bc5c-6406f6aa12dd
  type: component
  name: setup
  description: "Install integration command files into *project_root*.\n\n       \
    \ Returns the list of files created.  Copies raw templates without\n        processing.\
    \  Integrations that need placeholder replacement\n        (e.g. ``{SCRIPT}``,\
    \ ``__AGENT__``) should override ``setup()``\n        and call ``process_template()``\
    \ in their own loop \u2014 see\n        ``CopilotIntegration`` for an example.\n\
    \        "
- id: 71d09d60-6829-582c-a250-cb2a9fa7b29e
  type: component
  name: teardown
  description: "Uninstall integration files from *project_root*.\n\n        Delegates\
    \ to ``manifest.uninstall()`` which only removes files\n        whose hash still\
    \ matches the recorded value (unless *force*).\n        Also removes the managed\
    \ context section from the agent file.\n\n        Returns ``(removed, skipped)``\
    \ file lists.\n        "
- id: 2bc5e942-a6d6-5bac-940d-dea26eb25ee4
  type: component
  name: install
  description: "High-level install \u2014 calls ``setup()`` and returns created files."
- id: 6536637f-88f3-5e6e-b6f9-a6569933b4d1
  type: component
  name: uninstall
  description: "High-level uninstall \u2014 calls ``teardown()``."
- id: 1bb153ad-6175-55f0-9d13-5cdc9b12ab73
  type: component
  name: MarkdownIntegration
  description: "Concrete base for integrations that use standard Markdown commands.\n\
    \n    Subclasses only need to set ``key``, ``config``, ``registrar_config``\n\
    \    (and optionally ``context_file``).  Everything else is inherited.\n\n   \
    \ ``setup()`` processes command templates (replacing ``{SCRIPT}``,\n    ``{ARGS}``,\
    \ ``__AGENT__``, rewriting paths) and upserts the\n    managed context section\
    \ into the agent context file.\n    "
- id: 155af764-015a-5c3a-bb87-0e3b70a2e1bb
  type: component
  name: build_exec_args
  description: Function build_exec_args
- id: 3b7fdfa7-73be-56fd-a2e6-cc6149cd1a73
  type: component
  name: setup
  description: Function setup
- id: 53314a58-d832-5e15-a625-81adda0833ce
  type: component
  name: TomlIntegration
  description: "Concrete base for integrations that use TOML command format.\n\n \
    \   Mirrors ``MarkdownIntegration`` closely: subclasses only need to set\n   \
    \ ``key``, ``config``, ``registrar_config`` (and optionally\n    ``context_file``).\
    \  Everything else is inherited.\n\n    ``setup()`` processes command templates\
    \ through the same placeholder\n    pipeline as ``MarkdownIntegration``, then\
    \ converts the result to\n    TOML format (``description`` key + ``prompt`` multiline\
    \ string).\n    "
- id: 5b7eb62e-c0bd-5bfb-b0c0-38792d5fd6b2
  type: component
  name: build_exec_args
  description: Function build_exec_args
- id: e0783969-972f-5422-bfa5-4649fee7d371
  type: component
  name: command_filename
  description: TOML commands use ``.toml`` extension.
- id: 6ae5ce93-f872-52f0-bf35-d3e2fe3688aa
  type: component
  name: setup
  description: Function setup
- id: d0aa854a-12ac-5c25-b258-80b121157eff
  type: component
  name: YamlIntegration
  description: "Concrete base for integrations that use YAML recipe format.\n\n  \
    \  Mirrors ``TomlIntegration`` closely: subclasses only need to set\n    ``key``,\
    \ ``config``, ``registrar_config`` (and optionally\n    ``context_file``).  Everything\
    \ else is inherited.\n\n    ``setup()`` processes command templates through the\
    \ same placeholder\n    pipeline as ``MarkdownIntegration``, then converts the\
    \ result to\n    YAML recipe format (version, title, description, prompt block\
    \ scalar).\n    "
- id: a3f20083-81d1-5207-b7ad-47349477986e
  type: component
  name: command_filename
  description: YAML commands use ``.yaml`` extension.
- id: e964680c-e761-5935-80b0-8a0a2dbd3c17
  type: component
  name: setup
  description: Function setup
- id: bcae8d55-89be-582a-a7ba-49df8dadcb0f
  type: component
  name: SkillsIntegration
  description: "Concrete base for integrations that install commands as agent skills.\n\
    \n    Skills use the ``speckit-<name>/SKILL.md`` directory layout following\n\
    \    the `agentskills.io <https://agentskills.io/specification>`_ spec.\n\n  \
    \  Subclasses set ``key``, ``config``, ``registrar_config`` (and\n    optionally\
    \ ``context_file``) like any integration.  They may also\n    override ``options()``\
    \ to declare additional CLI flags (e.g.\n    ``--skills``, ``--migrate-legacy``).\n\
    \n    ``setup()`` processes each shared command template into a\n    ``speckit-<name>/SKILL.md``\
    \ file with skills-oriented frontmatter.\n    "
- id: f3bcc118-d23c-5c75-96c7-3c591d6d7562
  type: component
  name: build_exec_args
  description: Function build_exec_args
- id: 43c860e1-e747-5ca1-a758-c60f49fd5762
  type: component
  name: skills_dest
  description: "Return the absolute path to the skills output directory.\n\n     \
    \   Derived from ``config[\"folder\"]`` and the configured\n        ``commands_subdir``\
    \ (defaults to ``\"skills\"``).\n\n        Raises ``ValueError`` when ``config``\
    \ or ``folder`` is missing.\n        "
- id: f0ea9853-93f0-5a82-9a80-1d7d08ac735a
  type: component
  name: build_command_invocation
  description: Skills use ``/speckit-<stem>`` (hyphenated directory name).
- id: 5c72d378-3a15-57d4-84ba-9b1913249f7e
  type: component
  name: post_process_skill_content
  description: "Post-process a SKILL.md file's content after generation.\n\n     \
    \   Called by external skill generators (presets, extensions) to let\n       \
    \ the integration inject agent-specific frontmatter or body\n        transformations.\
    \  The base implementation injects shared skills\n        guidance for converting\
    \ dotted hook command names to hyphenated\n        slash commands.  Subclasses\
    \ may override \u2014 see ``ClaudeIntegration``.\n        "
- id: ed54d901-79da-57e8-a92a-e1ae70399713
  type: component
  name: setup
  description: "Install command templates as agent skills.\n\n        Creates ``speckit-<name>/SKILL.md``\
    \ for each shared command\n        template.  Each SKILL.md has normalised frontmatter\
    \ containing\n        ``name``, ``description``, ``compatibility``, and ``metadata``.\n\
    \        "
