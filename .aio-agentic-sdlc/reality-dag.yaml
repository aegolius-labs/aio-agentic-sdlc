- id: 06ce290d-c142-5c33-aa1c-ff645627a438
  type: component
  name: __init__
  description: "Initialize registry.\n\n        Args:\n            extensions_dir:\
    \ Path to .specify/extensions/ directory\n        "
- id: 6cbb5807-25c3-59f8-b466-59bd5ade08cd
  type: component
  name: add
  description: "Add extension to registry.\n\n        Args:\n            extension_id:\
    \ Extension ID\n            metadata: Extension metadata (version, source, etc.)\n\
    \        "
- id: cb2e9b53-fc1b-5228-9ca6-0a1298607552
  type: component
  name: update
  description: "Update extension metadata in registry, merging with existing entry.\n\
    \n        Merges the provided metadata with the existing entry, preserving any\n\
    \        fields not specified in the new metadata. The installed_at timestamp\n\
    \        is always preserved from the original entry.\n\n        Use this method\
    \ instead of add() when updating existing extension\n        metadata (e.g., enabling/disabling)\
    \ to preserve the original\n        installation timestamp and other existing\
    \ fields.\n\n        Args:\n            extension_id: Extension ID\n         \
    \   metadata: Extension metadata fields to update (merged with existing)\n\n \
    \       Raises:\n            KeyError: If extension is not installed\n        "
- id: 9f0c8fc6-3e02-5a5b-b049-51eeaa549849
  type: component
  name: restore
  description: "Restore extension metadata to registry without modifying timestamps.\n\
    \n        Use this method for rollback scenarios where you have a complete backup\n\
    \        of the registry entry (including installed_at) and want to restore it\n\
    \        exactly as it was.\n\n        Args:\n            extension_id: Extension\
    \ ID\n            metadata: Complete extension metadata including installed_at\n\
    \n        Raises:\n            ValueError: If metadata is None or not a dict\n\
    \        "
- id: 2ea27427-7d8e-5c39-9de3-7c0bf8ff9233
  type: component
  name: remove
  description: "Remove extension from registry.\n\n        Args:\n            extension_id:\
    \ Extension ID\n        "
- id: 954962c4-e44d-52b1-8c9a-9a7d7e8c4b90
  type: component
  name: get
  description: "Get extension metadata from registry.\n\n        Returns a deep copy\
    \ to prevent callers from accidentally mutating\n        nested internal registry\
    \ state without going through the write path.\n\n        Args:\n            extension_id:\
    \ Extension ID\n\n        Returns:\n            Deep copy of extension metadata,\
    \ or None if not found or corrupted\n        "
- id: f41b5151-eba0-53e4-b266-642b8c727e7a
  type: component
  name: list
  description: "Get all installed extensions with valid metadata.\n\n        Returns\
    \ a deep copy of extensions with dict metadata only.\n        Corrupted entries\
    \ (non-dict values) are filtered out.\n\n        Returns:\n            Dictionary\
    \ of extension_id -> metadata (deep copies), empty dict if corrupted\n        "
- id: 5b264a1d-073a-5d4e-9f22-b20194c75469
  type: component
  name: keys
  description: "Get all extension IDs including corrupted entries.\n\n        Lightweight\
    \ method that returns IDs without deep-copying metadata.\n        Use this when\
    \ you only need to check which extensions are tracked.\n\n        Returns:\n \
    \           Set of extension IDs (includes corrupted entries)\n        "
- id: 28a0c18b-f4fd-5946-bfe0-6f9d1b6190f0
  type: component
  name: is_installed
  description: "Check if extension is installed.\n\n        Args:\n            extension_id:\
    \ Extension ID\n\n        Returns:\n            True if extension is installed,\
    \ False if not or registry corrupted\n        "
- id: 271abaf8-a655-5e11-9639-0c235d9343f9
  type: component
  name: list_by_priority
