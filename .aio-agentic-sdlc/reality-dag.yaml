  description: Rewrite repo-relative paths to their generated project locations.
- id: dabebfee-0e1b-5ba6-bf13-d4853a713394
  type: component
  name: render_markdown_command
  description: "Render command in Markdown format.\n\n        Args:\n            frontmatter:\
    \ Command frontmatter\n            body: Command body content\n            source_id:\
    \ Source identifier (extension or preset ID)\n            context_note: Custom\
    \ context comment (default: <!-- Source: {source_id} -->)\n\n        Returns:\n\
    \            Formatted Markdown command file content\n        "
- id: b61d9c03-84af-562c-9d75-6c1c17e5df38
  type: component
  name: render_toml_command
  description: "Render command in TOML format.\n\n        Args:\n            frontmatter:\
    \ Command frontmatter\n            body: Command body content\n            source_id:\
    \ Source identifier (extension or preset ID)\n\n        Returns:\n           \
    \ Formatted TOML command file content\n        "
- id: 4a219804-3303-5d65-94a3-d7158c3a3680
  type: component
  name: render_yaml_command
  description: "Render command in YAML recipe format for Goose.\n\n        Args:\n\
    \            frontmatter: Command frontmatter\n            body: Command body\
    \ content\n            source_id: Source identifier (extension or preset ID)\n\
    \            cmd_name: Command name used as title fallback\n\n        Returns:\n\
    \            Formatted YAML recipe file content\n        "
- id: d9f75980-b47e-52a4-8cd2-e23d727d5b98
  type: component
  name: render_skill_command
  description: "Render a command override as a SKILL.md file.\n\n        SKILL-target\
    \ agents should receive the same skills-oriented\n        frontmatter shape used\
    \ elsewhere in the project instead of the\n        original command frontmatter.\n\
    \n        Technical debt note:\n        Spec-kit currently has multiple SKILL.md\
    \ generators (template packaging,\n        init-time conversion, and extension/preset\
    \ overrides). Keep the skill\n        frontmatter keys aligned (name/description/compatibility/metadata,\
    \ with\n        metadata.author and metadata.source subkeys) to avoid drift across\
    \ agents.\n        "
- id: 9f028a3c-14d6-59ac-89da-147187dd8932
  type: component
  name: build_skill_frontmatter
  description: Build consistent SKILL.md frontmatter across all skill generators.
- id: 55b76e4b-38b8-5e09-8cc3-10d0487ce446
  type: component
  name: resolve_skill_placeholders
  description: Resolve script placeholders for skills-backed agents.
- id: 39aeab3f-f11d-5434-a8e0-08a0e4709183
  type: component
  name: register_commands
  description: "Register commands for a specific agent.\n\n        Args:\n       \
    \     agent_name: Agent name (claude, gemini, copilot, etc.)\n            commands:\
    \ List of command info dicts with 'name', 'file', and optional 'aliases'\n   \
    \         source_id: Identifier of the source (extension or preset ID)\n     \
    \       source_dir: Directory containing command source files\n            project_root:\
    \ Path to project root\n            context_note: Custom context comment for markdown\
    \ output\n            _resolved_dir: Pre-resolved command directory (internal\
    \ use\n                only \u2014 avoids a second ``_resolve_agent_dir`` call\
    \ and\n                duplicate deprecation warnings when invoked from\n    \
    \            ``register_commands_for_all_agents``).\n            link_outputs:\
    \ If True, write rendered output to a source-local\n                dev cache\
    \ and symlink the agent command file to it. Falls back\n                to a normal\
    \ file write when symlinks are unavailable.\n\n        Returns:\n            List\
    \ of registered command names\n\n        Raises:\n            ValueError: If agent\
    \ is not supported\n        "
- id: ff122adb-0224-5fd6-a401-bd13e4efada1
  type: component
  name: write_copilot_prompt
  description: "Generate a companion .prompt.md file for a Copilot agent command.\n\
    \n        Args:\n            project_root: Path to project root\n            cmd_name:\
    \ Command name (e.g. 'speckit.my-ext.example')\n        "
- id: 2035a8f7-4912-5ad6-b2cf-b18b11a4b575
  type: component
  name: register_commands_for_all_agents
  description: "Register commands for all detected agents in the project.\n\n    \
    \    Args:\n            commands: List of command info dicts\n            source_id:\
    \ Identifier of the source (extension or preset ID)\n            source_dir: Directory\
    \ containing command source files\n            project_root: Path to project root\n\
    \            context_note: Custom context comment for markdown output\n      \
    \      link_outputs: If True, create dev-mode symlinks for rendered\n        \
    \        command files when supported by the OS.\n            create_missing_active_skills_dir:\
    \ If True, attempt missing-dir\n                recovery only for the active initialized\
    \ skills-backed agent.\n                Recovery requires active skills mode (or\
    \ Kimi's existing native\n                skills directory) and is skipped when\
    \ safe resolution or\n                creation fails.\n\n        Returns:\n  \
    \          Dictionary mapping agent names to list of registered commands\n   \
    \     "
- id: 3a5452c4-540a-574f-93b4-d4e93a80a4e1
  type: component
  name: register_commands_for_non_skill_agents
  description: "Register commands for all non-skill agents in the project.\n\n   \
    \     Like register_commands_for_all_agents but skips skill-based agents\n   \
    \     (those with extension '/SKILL.md'). Used by reconciliation to avoid\n  \
    \      overwriting properly formatted SKILL.md files.\n\n        Args:\n     \
    \       commands: List of command info dicts\n            source_id: Identifier\
    \ of the source\n            source_dir: Directory containing command source files\n\
    \            project_root: Path to project root\n            context_note: Custom\
    \ context comment for markdown output\n            link_outputs: If True, create\
    \ dev-mode symlinks for rendered\n                command files when supported\
    \ by the OS.\n\n        Returns:\n            Dictionary mapping agent names to\
    \ list of registered commands\n        "
- id: 846a4662-256c-598b-894a-d6108df9336d
  type: component
  name: unregister_commands
  description: "Remove previously registered command files from agent directories.\n\
    \n        When a ``legacy_dir`` is configured, files are removed from\n      \
    \  *both* the canonical and the legacy directory so that orphaned\n        commands\
    \ left behind after an ``integration upgrade`` are\n        cleaned up as well.\n\
    \n        Args:\n            registered_commands: Dict mapping agent names to\
    \ command name lists\n            project_root: Path to project root\n        "
