- id: 2ebf00ef-c11d-501f-add4-f86a1df8be8a
  type: component
  name: ingest_diff
  description: "\n    Loads intention/reality DAGs via DAGManager, uses DiffingEngine\
    \ to calculate the diff,\n    and merges the resulting tasks and edges into the\
    \ local backlog (backlog.json)\n    using core.load_backlog and core.save_backlog,\
    \ followed by core.prioritize_items.\n    "
- id: aa788b5d-b918-5414-b688-a1db5fda7ea4
  type: component
  name: execute_task_with_agent
  description: "\n    Instantiates the Agent using LocalAgentConfig. Configures system_instructions\n\
    \    for the 'sdlc_orchestrator' role, applies CapabilitiesConfig, and streams\n\
    \    the chat response for the task provided.\n    "
- id: 47757762-ac3c-582e-a93a-0bee49c1de94
  type: component
  name: main_loop
  description: "\n    1. Invokes ingest_diff().\n    2. Fetches the highest-priority\
    \ unblocked task via core.get_next_item().\n    3. Sets task status to 'In Progress'\
    \ via core.set_status().\n    4. Awaits execute_task_with_agent(task).\n    5.\
    \ Marks status 'Completed' (or 'Blocked' on failure).\n    "
