    \n        Args:\n            include_disabled: If True, include disabled extensions.\
    \ Default False.\n\n        Returns:\n            List of (extension_id, metadata_copy)\
    \ tuples sorted by priority.\n            Metadata is deep-copied to prevent accidental\
    \ mutation.\n        "
