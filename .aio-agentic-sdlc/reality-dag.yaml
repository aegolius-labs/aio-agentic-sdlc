  type: component
  name: CursorAgentIntegration
  description: Class CursorAgentIntegration
- id: c1561c9e-41ca-5eb5-aee5-db237eaef986
  type: component
  name: build_exec_args
  description: "Build CLI arguments for non-interactive ``cursor-agent`` execution.\n\
    \n        Always returns argv (no ``requires_cli`` guard) so workflow\n      \
    \  dispatch is supported even though the integration's ``config``\n        sets\
    \ ``requires_cli=False`` to keep the IDE-only flow unblocked.\n        This mirrors\
    \ ``CopilotIntegration``: dispatch support is signalled\n        by overriding\
    \ ``build_exec_args()``, not by the ``requires_cli``\n        flag (which is reserved\
    \ for the ``specify init`` precheck).\n\n        Mandatory headless flags:\n\n\
    \        * ``-p`` \u2014 print/headless mode (access to all tools)\n        *\
    \ ``--trust`` \u2014 bypass Workspace Trust prompt (CLI exits non-zero\n     \
    \     otherwise)\n        * ``--approve-mcps`` \u2014 auto-approve MCP server\
    \ loading (otherwise\n          MCP servers stay ``not loaded (needs approval)``\
    \ and tool calls\n          to them are silently dropped)\n        * ``--force``\
    \ \u2014 auto-approve tool invocations (shell/write/MCP),\n          matching\
    \ the implicit \"trusted environment\" semantics that other\n          integrations\
    \ (``claude -p``, ``codex --exec``) get by default\n\n        Together these are\
    \ the minimum set required to make\n        ``specify workflow run speckit --input\
    \ integration=cursor-agent``\n        behave the same way as it does for ``claude``\
    \ / ``codex``.\n        Verified locally: with ``--approve-mcps --force`` the\
    \ agent can\n        call any configured MCP server (e.g. ``dingtalk-doc``) and\
    \ write\n        files during ``/speckit-*`` skill execution; without them the\
    \ run\n        either drops tool calls or exits non-zero on the first approval\n\
    \        prompt.\n        "
