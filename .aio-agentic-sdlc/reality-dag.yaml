    \ descriptor mirrors ``extension.yml`` and ``preset.yml``::\n\n        schema_version:\
    \ \"1.0\"\n        integration:\n          id: \"my-agent\"\n          name: \"\
    My Agent\"\n          version: \"1.0.0\"\n          description: \"Integration\
    \ for My Agent\"\n          author: \"my-org\"\n        requires:\n          speckit_version:\
    \ \">=0.6.0\"\n          tools: [...]\n        provides:\n          commands:\
    \ [...]\n          scripts: [...]\n    "
