  type: component
  name: format_forge_command_name
  description: "Convert command name to Forge-compatible hyphenated format.\n    \n\
    \    Forge requires command names to use hyphens instead of dots for\n    compatibility\
    \ with ZSH and other shells. This function converts\n    dot-notation command\
    \ names to hyphenated format.\n    \n    The function is idempotent: already-formatted\
    \ names are returned unchanged.\n    \n    Examples:\n        >>> format_forge_command_name(\"\
    plan\")\n        'speckit-plan'\n        >>> format_forge_command_name(\"speckit.plan\"\
    )\n        'speckit-plan'\n        >>> format_forge_command_name(\"speckit-plan\"\
    )\n        'speckit-plan'\n        >>> format_forge_command_name(\"speckit.my-extension.example\"\
    )\n        'speckit-my-extension-example'\n        >>> format_forge_command_name(\"\
    speckit-my-extension-example\")\n        'speckit-my-extension-example'\n    \
    \    >>> format_forge_command_name(\"speckit.jira.sync-status\")\n        'speckit-jira-sync-status'\n\
    \    \n    Args:\n        cmd_name: Command name in dot notation (speckit.foo.bar),\
    \ \n                  hyphenated format (speckit-foo-bar), or plain name (foo)\n\
    \    \n    Returns:\n        Hyphenated command name with 'speckit-' prefix\n\
    \    "
- id: e3d3ccd6-dd4a-5b14-99c5-987ddeb4d8d0
