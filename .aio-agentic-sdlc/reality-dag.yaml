  description: Class TestKiroCliIntegration
- id: 4c514c0e-d70c-5385-a225-4eaec90ee0d0
  type: component
  name: test_registrar_config
  description: "Override base assertion: kiro-cli uses a prose fallback for args\n\
    \        because Kiro CLI file-based prompts do not natively substitute\n    \
    \    ``$ARGUMENTS`` (see issue #1926 / kirodotdev/Kiro#4141). The\n        regression-guard\
    \ load is carried by the two layer tests below\n        (exact-fallback + placeholder-shape\
    \ rejection)."
- id: f5d02ab8-ac8f-5fd5-9467-28a8229663a1
  type: component
  name: test_registrar_config_args_is_exact_prose_fallback
  description: "Layer 1 \u2014 pin the exact fallback so wording drift requires a\n\
    \        deliberate paired commit (production constant + test update)."
- id: 216d2ccd-0ab8-5605-89ee-cd85cd25d33c
  type: component
  name: test_registrar_config_args_does_not_look_like_a_placeholder_token
  description: "Layer 2 \u2014 independent regression guard: even if someone bypasses\n\
    \        layer-1 by changing both constant and test, the value still must not\n\
    \        look like ANY placeholder token shape ($X, ${X}, {{X}}, <X>, %X%, {0},\n\
    \        {% %}). Catches the class of regression Copilot called out: a swap\n\
    \        from $ARGUMENTS to $INPUT or {{userMessage}} would fail this test\n \
    \       even if it accidentally passed layer 1."
- id: f82f0ff7-92e9-5646-99e2-bfd544423ba1
  type: component
  name: test_rendered_prompts_do_not_contain_raw_arguments
  description: "Rendered Kiro prompt files must NOT contain the raw ``$ARGUMENTS``\n\
    \        token \u2014 Kiro CLI does not substitute it, so the literal would reach\n\
    \        the model and break the prompt (issue #1926)."
- id: 58c347b7-0287-5837-aebb-0c5e54e5ad00
  type: component
  name: test_rendered_prompts_contain_kiro_arg_placeholder
  description: "The chosen kiro-cli args fallback string must end up in at least\n\
    \        one rendered prompt (proves substitution actually fired, not just\n \
    \       that $ARGUMENTS was removed). Imports the fallback constant directly\n\
    \        instead of reading the field back so the test stays independent of\n\
    \        the integration's own config \u2014 even if the registrar_config['args']\n\
    \        regresses, this test still verifies the FALLBACK STRING is in the\n \
    \       rendered output."
- id: 1a3cc4ef-b210-5e07-8cd3-8c4e6d3e1654
  type: component
  name: TestKiroIntegration
  description: --integration kiro-cli creates expected files.
