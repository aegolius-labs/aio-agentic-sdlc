    \  Resolution:\n        1. ``SPECKIT_INTEGRATION_CATALOG_URL`` env var\n     \
    \   2. Project ``.specify/integration-catalogs.yml``\n        3. User ``~/.specify/integration-catalogs.yml``\n\
    \        4. Built-in defaults (built-in + community)\n        "
