  description: _fetch_single_catalog passes Authorization header when configured.
- id: 55fe50ad-8c91-5420-b245-dba09c59bbb6
  type: component
  name: test_fetch_single_catalog_rejects_malformed_payload
  description: "Malformed catalog payloads raise PresetError, not AttributeError.\n\
    \n        Without this guard, a payload like ``{\"presets\": []}`` would pass\
    \ the\n        key-presence check and then crash with ``AttributeError: 'list'\
    \ object\n        has no attribute 'items'`` deep inside ``_get_merged_packs``.\
    \ The\n        sibling integration catalog reader already validates both the root\n\
    \        object and the nested mapping (see ``integrations/catalog.py``); the\n\
    \        preset catalog must stay consistent.\n        "
- id: 2648f7de-be74-5846-8f9a-2d6dcbcc1b66
  type: component
  name: test_fetch_single_catalog_rejects_malformed_cached_payload
  description: "A poisoned cache silently falls back to the network instead of\n \
    \       crashing \u2014 cached payloads pass through the same shape validation\n\
    \        as freshly-fetched ones.\n\n        Without this, a cache poisoned by\
    \ an older spec-kit version (or a\n        manual edit, or an upstream that briefly\
    \ served a bad payload\n        before the network guards landed) would re-crash\
    \ every invocation\n        of ``_get_merged_packs`` despite the cache being \"\
    valid\" by age.\n        The recovery contract is: if the cached payload fails\
    \ validation,\n        drop it and refetch \u2014 never propagate ``AttributeError``\
    \ to the\n        caller.\n        "
- id: de43de19-646b-52d9-a974-7d678259de2f
  type: component
  name: test_fetch_catalog_rejects_malformed_payload
  description: "Legacy ``fetch_catalog`` reuses the same shape-validation helper.\n\
    \n        Before this change ``fetch_catalog`` only checked key presence \u2014\
    \n        so a payload like ``42`` would crash with\n        ``TypeError: argument\
    \ of type 'int' is not iterable`` during the\n        ``\"schema_version\" in\
    \ catalog_data`` check, and an entry mapping\n        of the wrong type would\
    \ crash downstream. Reusing\n        ``_validate_catalog_payload`` keeps the network-side\
    \ behaviour of\n        the legacy single-catalog method consistent with the multi-catalog\n\
    \        ``_fetch_single_catalog`` path.\n        "
- id: 646b3646-3985-56a3-8ebc-e6808bd6384b
  type: component
  name: test_fetch_catalog_recovers_from_unreadable_cache
  description: "An unreadable / wrong-encoded cache file silently refetches.\n\n \
    \       The cache contract is best-effort: a JSON-decode failure, an OS\n    \
    \    read failure (permissions / disk / handle limit), or an invalid\n       \
    \ text encoding on a cache file written by an older client must\n        all fall\
    \ through to the network fetch rather than crash the\n        caller. Covers Copilot's\
    \ review point that the previous\n        ``except (json.JSONDecodeError, OSError)``\
    \ was missing\n        ``UnicodeError``.\n        "
- id: 98746ac3-6b13-560d-a14f-6b1698c1d889
  type: component
  name: test_fetch_catalog_recovers_from_unreadable_metadata
  description: "A wrongly-encoded metadata file degrades to a cache miss.\n\n    \
    \    ``is_cache_valid`` is consulted *before* the cache payload is\n        read;\
    \ if the metadata file itself can't be decoded (e.g. it was\n        written on\
    \ a host whose default codec isn't UTF-8) the validity\n        check must return\
    \ ``False`` rather than propagate\n        ``UnicodeDecodeError``. Without that\
    \ guard, a corrupted metadata\n        file would crash every invocation instead\
    \ of falling through to\n        a network refetch.\n        "
- id: 60d25f0e-8c3d-551d-9ec0-17a3944c600b
  type: component
  name: test_is_cache_valid_handles_non_mapping_metadata
  description: "Metadata that parses to a non-mapping degrades to cache-invalid.\n\
    \n        The cache-validity check calls ``metadata.get(\"cached_at\", \"\")``\n\
    \        immediately after ``json.loads``. If the metadata file is valid\n   \
    \     JSON but parses to a non-mapping (``[]``, ``\"oops\"``, ``42``,\n      \
    \  ``true``, ``null``), ``.get`` raises ``AttributeError`` \u2014 which\n    \
    \    previously slipped past the except tuple and crashed the\n        caller.\
    \ The contract documented on ``is_cache_valid`` says any\n        decode/shape\
    \ failure should return ``False`` so ``fetch_catalog``\n        falls through\
    \ to a network refetch. This test pins that\n        contract across every JSON\
    \ non-mapping root type.\n        "
- id: fcfcb024-ddef-5404-a699-6939517177b8
  type: component
  name: test_fetch_catalog_writes_cache_as_utf8
  description: "Cache + metadata writes pass ``encoding=\"utf-8\"``, observably.\n\
    \n        The earlier version of this test claimed to assert UTF-8 at the\n  \
    \      byte level but actually only round-tripped a non-ASCII string\n       \
    \ through ``json.dumps`` and ``read_text(encoding=\"utf-8\")``.\n        Because\
    \ ``json.dumps`` defaults to ``ensure_ascii=True``, \"caf\xE9\"\n        was serialized\
    \ as the all-ASCII escape ``caf\\\\u00e9`` before it\n        ever reached ``write_text``\
    \ \u2014 the bytes on disk were identical\n        regardless of the encoding\
    \ kwarg. The drift Copilot's review\n        flagged wasn't actually being caught.\n\
    \n        Fix: directly observe the ``encoding`` argument passed to every\n  \
    \      ``write_text`` call made against the cache directory. This is\n       \
    \ the production code's encoding choice, which is exactly what\n        the regression\
    \ guard cares about.\n        "
- id: 72e51be9-0e79-5bae-afa4-515d6146d940
  type: component
  name: test_fetch_catalog_survives_unwritable_cache
  description: "An unwritable cache dir doesn't fail a successful fetch.\n\n     \
    \   Cache writes are best-effort, mirroring the read side and the\n        ``integrations/catalog.py``\
    \ precedent: if ``mkdir``/``write_text``\n        raises ``OSError`` (read-only\
    \ checkout, permissions), the\n        already-fetched-and-validated payload must\
    \ still be returned \u2014\n        not swallowed into the broad except and re-raised\
    \ as a\n        ``PresetError``.\n        "
- id: c67a7dee-258d-57e0-a84a-9a823bd48736
  type: component
  name: test_get_merged_packs_skips_non_mapping_entries
  description: "Per-entry guard: one malformed entry shouldn't poison the merge.\n\
    \n        ``_fetch_single_catalog`` validates that ``presets`` is a mapping,\n\
    \        but it doesn't (and shouldn't) validate every entry inside it \u2014\
    \ a\n        single bad entry in an otherwise-valid catalog should be skipped,\n\
    \        not crash the whole resolve path. Mirrors the per-entry skip in\n   \
    \     ``integrations/catalog.py``: a malformed entry returns no error,\n     \
    \   valid entries continue to merge normally.\n        "
