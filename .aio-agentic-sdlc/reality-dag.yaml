- id: 0dd910cd-e599-57e0-9a4c-dfab4719ccf1
  type: component
  name: IntegrationManifest
  description: "Tracks files installed by a single integration.\n\n    Parameters:\n\
    \        key:          Integration identifier (e.g. ``\"copilot\"``).\n      \
    \  project_root: Absolute path to the project directory.\n        version:   \
    \   CLI version string recorded in the manifest.\n        resolve_project_root:\
    \ Resolve ``project_root`` before using it.\n    "
- id: cd206f16-ccf3-546c-bc6f-8d21a9392b7f
  type: component
  name: __init__
  description: Function __init__
- id: 2cfa4080-1c0a-5d99-acac-9de6dddaa4bb
  type: component
  name: manifest_path
  description: Path to the on-disk manifest JSON.
- id: bbd6ff9a-1d62-5741-a352-e36894d7409b
  type: component
  name: record_file
  description: "Write *content* to *rel_path* (relative to project root) and record\
    \ its hash.\n\n        Creates parent directories as needed.  Returns the absolute\
    \ path\n        of the written file.\n        If the path was previously marked\
    \ as recovered via\n        ``record_existing(recovered=True)``, the recovered\
    \ marker is\n        cleared because the bytes are now produced, not merely observed.\n\
    \n        Raises ``ValueError`` if *rel_path* resolves outside the project root.\n\
    \        "
- id: db6ad1ee-9008-5ffe-9e85-dc4f5ddbbc96
  type: component
  name: record_existing
  description: "Record the hash of an already-existing regular file at *rel_path*.\n\
    \n        When ``recovered=True``, the path is also marked in the manifest's\n\
    \        ``recovered_files`` list to signal that the file's on-disk hash was\n\
    \        *observed* during install (because the file already existed and was not\n\
    \        overwritten), not *produced* by the install. Future ``refresh_managed``\n\
    \        runs should consult ``is_recovered`` before treating the recorded hash\n\
    \        as a managed baseline.\n\n        Raises:\n            ValueError: if\
    \ *rel_path* resolves outside the project root, is\n                a symlink,\
    \ or is not a regular file. A directory or other\n                non-file path\
    \ cannot be silently recorded \u2014 its hash would\n                be meaningless\
    \ and ``check_modified``/``uninstall`` would\n                treat the entry\
    \ as permanently broken.\n            OSError: if the underlying filesystem call\
    \ (``is_symlink``,\n                ``is_file``, or the file-read used to compute\
    \ the hash)\n                fails \u2014 for example a ``PermissionError`` on\
    \ the path.\n                Callers should be prepared to handle ``OSError``\
    \ (and its\n                subclasses such as ``PermissionError``) in addition\
    \ to\n                ``ValueError``.\n        "
