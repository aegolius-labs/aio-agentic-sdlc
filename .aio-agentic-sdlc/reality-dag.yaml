  description: "Load a run state from disk.\n\n        Validates ``run_id`` against\
    \ ``_RUN_ID_PATTERN`` *before* building\n        the lookup path. Without this\
    \ guard, a caller passing a value like\n        ``../escape`` (e.g. via ``specify\
    \ workflow resume`` CLI argument)\n        would interpolate path-traversal segments\
    \ into\n        ``runs_dir`` below, letting ``state_path.exists()`` probe arbitrary\n\
    \        paths and ``json.load`` read attacker-planted JSON from outside\n   \
    \     the project's ``runs/`` directory. ``__init__`` already runs this\n    \
    \    check on the stored ``state_data[\"run_id\"]``, but that fires\n        *after*\
    \ the file lookup \u2014 too late to prevent the disclosure.\n        Mirrors\
    \ the precedent in ``agents._ensure_within_directory``.\n        "
