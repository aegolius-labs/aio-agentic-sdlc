- id: f94de62f-6ec9-5e1f-b62b-751a7a70d4f9
  type: component
  name: test_save_load_round_trip_preserves_non_ascii
  description: "Non-ASCII values round-trip via explicit UTF-8 encoding.\n\n     \
    \   ``Path.write_text`` / ``Path.read_text`` default to the system\n        locale\
    \ codec on Windows (cp1252 / gb2312 / cp932). Without\n        ``encoding=\"utf-8\"\
    `` pinned on both ends, a project name like\n        ``caf\xE9`` written on a\
    \ UTF-8 host becomes garbled or unreadable on\n        a cp1252 host (and vice\
    \ versa). Pin UTF-8 explicitly so init\n        options round-trip across machines\
    \ and CI.\n\n        Note: this test only meaningfully exercises the encoding\
    \ pin\n        because ``save_init_options`` now writes JSON with\n        ``ensure_ascii=False``\
    \ \u2014 otherwise ``json.dumps`` would output\n        ASCII-only ``\\\\uXXXX``\
    \ escapes and the encoding pin would be a\n        no-op for any value here. ``test_save_writes_real_utf8_bytes``\n\
    \        below asserts that contract directly.\n        "
- id: 30bf41a7-9c86-534e-8173-cea3db77328d
  type: component
  name: test_save_writes_real_utf8_bytes
  description: "The on-disk file contains real UTF-8 bytes, not ``\\\\uXXXX`` escapes.\n\
    \n        Pinning ``encoding=\"utf-8\"`` on ``write_text`` only makes a\n    \
    \    difference when the serialiser actually emits non-ASCII\n        characters.\
    \ With ``ensure_ascii=False`` on ``json.dumps`` the\n        non-ASCII bytes hit\
    \ the file, so the encoding pin is the thing\n        that decides between cp1252\
    \ garbage and clean UTF-8 on Windows.\n\n        This test pins that behaviour:\
    \ the on-disk bytes are valid UTF-8\n        and contain the multi-byte encoding\
    \ of ``caf\xE9``, not its\n        ``\\\\u00e9`` escape form. Reviewers can verify\
    \ that removing\n        ``ensure_ascii=False`` or ``encoding=\"utf-8\"`` from\
    \ the writer\n        breaks this test, which is what Copilot's review pointed\
    \ out the\n        original round-trip test failed to do.\n        "
- id: 94e69821-c212-54d8-aca1-3c310f477bbb
  type: component
  name: test_load_returns_empty_on_locale_corrupted_file
  description: "A file written in a non-UTF-8 codec falls back to {}, not crash.\n\
    \n        Simulates a file produced by an old client (or by a peer machine\n \
    \       with a different default locale) that contains bytes invalid as\n    \
    \    UTF-8. ``load_init_options`` should fall back to ``{}`` per the\n       \
    \ existing contract \u2014 never propagate a raw ``UnicodeDecodeError``\n    \
    \    to the CLI surface.\n        "
