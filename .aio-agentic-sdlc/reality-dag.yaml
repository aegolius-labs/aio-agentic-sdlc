- id: 72369c9b-78f8-5304-83f9-3b5f93e7c1fd
  type: component
  name: build_github_request
  description: "Build a urllib Request, adding a GitHub auth header when available.\n\
    \n    Reads GITHUB_TOKEN or GH_TOKEN from the environment and attaches an\n  \
    \  ``Authorization: Bearer <value>`` header when the target hostname is one\n\
    \    of the known GitHub-owned domains. Non-GitHub URLs are returned as plain\n\
    \    requests so credentials are never leaked to third-party hosts.\n\n    Raises:\n\
    \        ValueError: If ``url`` is empty or whitespace-only.\n        ValueError:\
    \ If ``url`` does not use the ``http`` or ``https`` scheme.\n        ValueError:\
    \ If ``url`` does not include a hostname.\n    "
- id: 45e1f393-60eb-5f0f-bd75-15e81c0f2c8e
  type: component
  name: resolve_github_release_asset_api_url
  description: "Resolve a GitHub browser release URL to its REST API asset URL.\n\n\
    \    For private or SSO-protected repositories, browser release download\n   \
    \ URLs (``https://github.com/<owner>/<repo>/releases/download/<tag>/<asset>``)\n\
    \    redirect to an HTML/SSO page instead of delivering the file.  This\n    helper\
    \ resolves such a URL to the matching GitHub REST API asset URL\n    (``https://api.github.com/repos/\u2026\
    /releases/assets/<id>``), which can\n    then be downloaded with ``Accept: application/octet-stream``\
    \ and an\n    auth token to retrieve the actual file payload.\n\n    If *download_url*\
    \ is already a REST API asset URL, it is returned\n    as-is.  Non-GitHub URLs\
    \ and GitHub URLs that are not release-download\n    URLs return ``None``.  If\
    \ the API lookup fails (e.g. network error or\n    asset not found), ``None``\
    \ is returned so callers can fall back to the\n    original URL.\n\n    Args:\n\
    \        download_url: The URL to resolve.\n        open_url_fn: A callable compatible\
    \ with\n            ``specify_cli.authentication.http.open_url`` used to make\
    \ the\n            authenticated API request.\n        timeout: Per-request timeout\
    \ in seconds.\n\n    Returns:\n        The resolved REST API asset URL, or ``None``\
    \ if resolution is not\n        applicable or fails.\n    "
