  description: Refresh default-sensitive shared templates without touching scripts.
- id: cd082750-7881-5e51-905e-67f6a244e937
  type: component
  name: install_shared_infra
  description: "Install shared scripts and templates into *project_path*.\n\n    When\
    \ ``refresh_managed`` is True, files whose on-disk hash still matches\n    the\
    \ previously recorded manifest hash are overwritten with the bundled\n    version.\
    \ Files whose hash diverges are treated as user customizations and\n    preserved\
    \ with a warning. ``force=True`` overwrites every regular file\n    (symlinks\
    \ and symlinked-parent destinations are always preserved with a\n    warning \u2014\
    \ the safe-destination check refuses to follow them so writes\n    cannot escape\
    \ the project root). ``refresh_hint`` is shown after the\n    customization warning\
    \ to tell the user which flag would overwrite their\n    customizations.\n    "
