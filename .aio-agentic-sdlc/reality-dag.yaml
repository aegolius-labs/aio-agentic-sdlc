- id: b63f1dab-dceb-501b-a5a1-b9e508bcc400
  type: component
  name: TestCursorAgentCliDispatch
  description: "Verify the CLI dispatch path for cursor-agent (issue #2629).\n\n \
    \   The ``cursor-agent`` CLI supports headless execution via ``-p`` (with\n  \
    \  full tool access including write/shell) and requires ``--trust`` to\n    bypass\
    \ the Workspace Trust prompt.  These tests pin the exact argv\n    shape that\
    \ the workflow runner will use.\n    "
- id: 36458d96-bd5f-5126-a3fa-abdb593c7992
  type: component
  name: test_requires_cli_is_false_for_ide_first_flow
  description: "``requires_cli`` must stay False so the IDE-only flow keeps working.\n\
    \n        ``specify init --integration cursor-agent`` (without ``--ignore-agent-tools``)\n\
    \        treats ``requires_cli=True`` as a hard precheck and fails when the\n\
    \        ``cursor-agent`` CLI isn't on PATH \u2014 even though the Cursor IDE\n\
    \        / skills flow can run without it.  Workflow dispatch support is\n   \
    \     signalled by overriding ``build_exec_args()`` instead, mirroring\n     \
    \   ``CopilotIntegration``.\n        "
- id: 955c7a25-68cb-5bbe-a96f-aa2acdc32bcb
  type: component
