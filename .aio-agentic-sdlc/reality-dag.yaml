  type: component
  name: CommandRegistrar
  description: "Handles registration of commands with AI agents.\n\n    Supports writing\
    \ command files in Markdown or TOML format to the\n    appropriate agent directory,\
    \ with correct argument placeholders\n    and companion files (e.g. Copilot .prompt.md).\n\
    \    "
- id: 38fef251-0c6d-5f39-b870-16ff56e58604
  type: component
  name: __init__
  description: Function __init__
- id: 01ee5c19-a6d4-592c-bfc4-b73765ef39c3
  type: component
  name: parse_frontmatter
  description: "Parse YAML frontmatter from Markdown content.\n\n        Args:\n \
    \           content: Markdown content with YAML frontmatter\n\n        Returns:\n\
    \            Tuple of (frontmatter_dict, body_content)\n        "
- id: 7570125c-e9c9-5857-945f-83979b8110fa
  type: component
  name: render_frontmatter
  description: "Render frontmatter dictionary as YAML.\n\n        Args:\n        \
    \    fm: Frontmatter dictionary\n\n        Returns:\n            YAML-formatted\
    \ frontmatter with delimiters\n        "
- id: b7db44c7-a737-5731-939b-01ee750a1c49
  type: component
