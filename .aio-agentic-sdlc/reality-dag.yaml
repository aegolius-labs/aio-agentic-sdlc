- id: 649aed42-8690-5586-aca0-a2de79936080
  type: component
  name: test_validate_workflow_rejects_non_string_default_for_string_type
  description: "``type: string`` must require an actual string \u2014 a numeric YAML\n\
    \        default like ``5`` would otherwise slip through unvalidated.\n      \
    \  "
