  name: update
  description: "Update preset metadata in registry.\n\n        Merges the provided\
    \ updates with the existing entry, preserving any\n        fields not specified.\
    \ The installed_at timestamp is always preserved\n        from the original entry.\n\
    \n        Args:\n            pack_id: Preset ID\n            updates: Partial\
    \ metadata to merge into existing metadata\n\n        Raises:\n            KeyError:\
    \ If preset is not installed\n        "
- id: 41a6f396-f489-5a2d-9af6-fbd9f417496c
  type: component
  name: restore
  description: "Restore preset metadata to registry without modifying timestamps.\n\
    \n        Use this method for rollback scenarios where you have a complete backup\n\
    \        of the registry entry (including installed_at) and want to restore it\n\
    \        exactly as it was.\n\n        Args:\n            pack_id: Preset ID\n\
    \            metadata: Complete preset metadata including installed_at\n\n   \
    \     Raises:\n            ValueError: If metadata is None or not a dict\n   \
    \     "
- id: 066fe72e-9411-5d06-9523-44a7eb9d6973
  type: component
  name: get
  description: "Get preset metadata from registry.\n\n        Returns a deep copy\
    \ to prevent callers from accidentally mutating\n        nested internal registry\
    \ state without going through the write path.\n\n        Args:\n            pack_id:\
    \ Preset ID\n\n        Returns:\n            Deep copy of preset metadata, or\
    \ None if not found or corrupted\n        "
- id: 65743895-7bd8-5a68-b4ba-ae890733b1ac
  type: component
  name: list
  description: "Get all installed presets with valid metadata.\n\n        Returns\
    \ a deep copy of presets with dict metadata only.\n        Corrupted entries (non-dict\
    \ values) are filtered out.\n\n        Returns:\n            Dictionary of pack_id\
    \ -> metadata (deep copies), empty dict if corrupted\n        "
- id: f5bf070c-fc9f-57af-8467-382dc4e9ad22
  type: component
  name: keys
  description: "Get all preset IDs including corrupted entries.\n\n        Lightweight\
    \ method that returns IDs without deep-copying metadata.\n        Use this when\
    \ you only need to check which presets are tracked.\n\n        Returns:\n    \
    \        Set of preset IDs (includes corrupted entries)\n        "
- id: c24b635a-4bc1-5b2f-9912-a01170c525b6
  type: component
  name: list_by_priority
  description: "Get all installed presets sorted by priority.\n\n        Lower priority\
    \ number = higher precedence (checked first).\n        Presets with equal priority\
    \ are sorted alphabetically by ID\n        for deterministic ordering.\n\n   \
    \     Args:\n            include_disabled: If True, include disabled presets.\
    \ Default False.\n\n        Returns:\n            List of (pack_id, metadata_copy)\
    \ tuples sorted by priority.\n            Metadata is deep-copied to prevent accidental\
    \ mutation.\n        "
- id: 9d125229-7e15-59cf-bb1f-38c953c6f89b
  type: component
  name: is_installed
  description: "Check if preset is installed.\n\n        Args:\n            pack_id:\
    \ Preset ID\n\n        Returns:\n            True if pack is installed, False\
    \ if not or registry corrupted\n        "
