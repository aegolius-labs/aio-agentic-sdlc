  description: "Return the active catalog stack as a list of dicts.\n\n        Thin\
    \ adapter over :meth:`get_active_catalogs` that yields plain dicts\n        suitable\
    \ for CLI rendering and JSON-like consumers.\n        "
- id: cb6f2ece-4afd-5f28-abd6-9754e839021a
  type: component
  name: get_project_catalog_configs
  description: Return removable project-level catalog config entries, if configured.
- id: 801ece03-fc6b-519c-8d9e-5c5664b83b7a
  type: component
  name: add_catalog
  description: "Add a catalog source to the project-level config file.\n\n       \
    \ The URL is normalized (whitespace stripped) and validated before being\n   \
    \     written. Duplicate URLs are rejected, including near-duplicates that\n \
    \       differ only by surrounding whitespace. Priority is derived as\n      \
    \  ``max(existing) + 1`` so the new entry sorts last in the resolution\n     \
    \   order unless the user edits the file manually.\n        "
- id: 64e09b25-3abb-5973-b60e-116da18dd637
  type: component
  name: remove_catalog
  description: "Remove a catalog source by 0-based index.\n\n        ``index`` is\
    \ interpreted in the same display order shown by\n        ``integration catalog\
    \ list`` (i.e. sorted ascending by priority,\n        with missing priority defaulting\
    \ to ``yaml_index + 1``, matching\n        ``_load_catalog_config()``). This way,\
    \ the index a user sees in\n        ``catalog list`` is the index they pass to\
    \ ``catalog remove``,\n        even if the underlying YAML lists entries in a\
    \ different order\n        from how they sort by priority.\n\n        Returns\
    \ the removed catalog's name.\n        "
- id: 0dc4b952-985a-54e7-a0c5-c7c31fb43591
  type: component
  name: IntegrationDescriptor
