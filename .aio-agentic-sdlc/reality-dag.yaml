  type: component
  name: build_request
  description: "Build a :class:`~urllib.request.Request`, attaching auth when config\
    \ matches.\n\n    Uses the first matching entry from ``auth.json`` whose token\
    \ resolves.\n    Returns a plain request when no entry matches or the file doesn't\
    \ exist.\n    "
- id: faead699-42bc-5bb3-90ed-3400fbe93094
  type: component
  name: open_url
  description: "Open *url* with config-driven auth, redirect stripping, and fallthrough.\n\
    \n    1. Find ``auth.json`` entries whose hosts match the URL.\n    2. For each\
    \ entry, resolve the token and try the request.\n    3. On 401/403 move to the\
    \ next matching entry.\n    4. After all entries exhausted (or none matched),\
    \ try unauthenticated.\n    5. Non-auth errors (404, 500, network) raise immediately.\n\
    \n    *extra_headers* (e.g. ``Accept``) are merged into every attempt.\n    *redirect_validator*,\
    \ when provided, is called with ``(old_url, new_url)``\n    before following each\
    \ redirect and may raise to reject the redirect.\n    "
