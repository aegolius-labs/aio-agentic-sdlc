metadata:
  name: AIO Agentic SDLC
  version: 1.0.0
nodes:
- id: 4d76717e-55cd-4768-b05e-06a3cce1128b
  type: system
  name: AIO Agentic SDLC System
  domain: sdlc
  description: Dual-DAG reconciliation engine for autonomous software development
- id: 54b91d55-08fe-48df-be35-445be7cd1e46
  type: container
  name: Agentic Orchestrator Loop
  domain: orchestration
  description: Main orchestrator binding the calculated Diff to the SDLC Pipeline
- id: cb432b58-db06-4d49-a6ab-c11c9e86bcc2
  type: container
  name: DAG Engine Container
  domain: core
  description: Core container for DAG management and difference calculation
- id: f4d2f082-e822-4aa6-b74d-38b14bd84c87
  type: module
  name: QA Swarm Orchestrator
  domain: qa
  description: Manages a swarm of specialized QA subagents to ensure bulletproof code
    generation
- id: fa35fa8a-b6b5-40ca-9080-b31421117e37
  type: component
  name: Diffing Engine
  domain: core
  description: Calculates the Diff by superimposing Intention DAG over Reality DAG
- id: 0fea8fea-9a23-404b-a16b-a9c9c3990e1b
  type: component
  name: Reality DAG Generator
  domain: core
  description: Generates an accurate, real-time graph of the existing codebase
- id: 9066081a-24ea-4937-9f47-5ba87e09f731
  type: component
  name: Parallel Task Runner
  domain: orchestration
  description: Spawns concurrent subagents for unblocked items in the backlog, handling
    DAG concurrency and merge conflicts
- id: 7b029abd-1321-4cd7-9c1d-9e9f7b62046c
  type: entity
  name: Operational Modes Config
  domain: orchestration
  description: Configuration for approval gates vs bypass mode for continuous delivery
- id: 22822d50-4438-4b48-821f-451933f557dd
  type: agent
  name: SDLC Intake Agent
  domain: ux
  description: Chats with the user, distills ideas into PRDs, and writes them to the
    inbox/ directory safely without writing execution code
- id: 07e7e16c-c4d7-4f59-ac98-5d33599f0270
  type: agent
  name: SDLC Architect Agent
  domain: core
  description: Reads PRDs from inbox/, performs technical research, maps new architectural
    nodes into intention-dag.yaml, and moves processed PRDs to specs/.
- id: d4049c0c-4bf8-4d13-94b6-5e5410190f49
  type: entity
  name: Inbox Directory
  domain: ux
  description: Directory containing new, unprocessed Product Requirement Documents
    (PRDs).
- id: f24b7477-032b-4f93-abcf-9b1c70627900
  type: component
  name: CLI Entrypoint
  domain: ux
  description: Exposes plan and apply commands to run the DiffingEngine and Orchestrator
    Loop
- id: b4e6a8f3-a7f7-489e-8192-6d969a8fa6dd
  type: entity
  name: Subagent Output Templates
  domain: orchestration
  description: Structured reporting templates for each subagent so the Orchestrator
    can compile a clean, human-readable summary of the entire parallel session.
- id: 37c790a3-75a2-4533-9384-889a06a9e573
  type: component
  name: Agent Format Migrator
  domain: core
  description: Tooling to scan .agents/agents/ for legacy agent.json and system_prompt.md
    files, consolidate them into agent.md with YAML frontmatter, and delete the legacy
    files.
- id: 277fe548-6b99-4711-a89c-b681d262f820
  type: entity
  name: Unified Agent Definitions
  domain: core
  description: Standardized agent definitions using the unified agent.md format with
    YAML frontmatter and markdown instructions.
- id: 64b5afea-5e38-4659-82bb-662be3f3458e
  type: entity
  name: Unified Configuration File
  domain: core
  description: Primary configuration schema (.aio-sdlc.json), replacing legacy external
    trackers.
- id: 45b34e7b-3c77-48f9-9b7c-8ec541243767
  type: entity
  name: Agent Personas Config
  domain: ux
  description: Configuration for custom names and personalities of user-facing agents,
    injected into prompts.
- id: 900f5127-2c5e-46e1-890e-991ef7b27043
  type: component
  name: Commercial Licensing Enforcer
  domain: security
  description: Validates commercial usage via license keys against an external Merchant
    of Record API.
- id: 3ea4e322-7259-4f15-99c8-cbee950afe00
  type: component
  name: EULA & Privacy Prompt
  domain: ux
  description: Clickwrap prompt for first-time users to accept the Non-Commercial
    terms and Privacy Policy.
- id: da3ee4cb-c37b-40f1-a1c4-93c24822e597
  type: endpoint
  name: Merchant of Record API
  domain: security
  description: External API (e.g., Lemon Squeezy/Paddle) to validate keys and manage
    software monetization.
- id: 10d4c0ba-de03-49ac-ae0e-41048fd557ed
  type: component
  name: Daemon Watcher
  domain: orchestration
  description: Long-running background process that monitors the inbox directory for
    PRDs and triggers pipelines.
- id: f1009cfe-9cde-4260-9235-72886d71fa94
  type: container
  name: MCP Server
  domain: orchestration
  description: Primary MCP-First interface for agents, exposing dynamic resources
    (e.g., the diff backlog) and core tools.
- id: c2d35f1b-2d6c-43db-9c54-91f1f5d125f2
  type: entity
  name: Specs Directory
  domain: core
  description: Directory storing deterministic Markdown Software Design Documents
    natively bound to the DAG.
- id: 48295997-8b54-4168-bccc-30d49ae766d8
  type: agent
  name: Implementer Agent
  domain: core
  description: Swarm agent that implements SDDs, returning Variance Reports if technical
    roadblocks occur.
- id: 483abc2c-fab5-460f-9cd7-47bc25e0d3b3
  type: component
  name: Variance Report Router
  domain: orchestration
  description: Captures spec pushback from implementers and routes it to the Architect
    for dynamic SDD revision.
- id: 40566eb0-0911-40cc-a1df-9ff6697734c8
  type: component
  name: Approval Gate
  domain: orchestration
  description: Pauses pipeline before merging for user review, bypassable via configuration.
- id: 5a916efe-75ec-4b0d-a8de-79fcd8e5035c
  type: component
  name: Conflict Resolution Manager
  domain: orchestration
  description: Detects and resolves DAG and file-level merge conflicts across parallel
    execution tasks.
- id: 54a600df-269a-42b2-a7e1-62f2a6687169
  type: agent
  name: Specialized QA Agents
  domain: qa
  description: Swarm of specialized subagents (A11Y, Security, API Contracts, etc.)
    invoked for domain-specific checks.
- id: bcb5855b-46cf-475c-bf5c-5267a124e58a
  type: agent
  name: SDLC Researcher Agent
  domain: core
  description: Dedicated subagent spawned by the Architect to perform deep technical
    research and draft spikes.
- id: 6ff0c1eb-b872-4036-987b-20988d9b380f
  type: entity
  name: Research Spikes Directory
  domain: core
  description: Output location for Research Spikes generated by the Researcher Agent.
- id: b9c4304e-70cd-47de-a94c-dcfbbca66335
  type: component
  name: Session Report Compiler
  domain: orchestration
  description: Compiles structured subagent templates into unified Markdown session
    summaries.
- id: a187faf6-c03a-4657-9ac6-9319e51499b8
  type: component
  name: Telemetry Module
  domain: core
  description: Lightweight client for collecting anonymized usage metrics and crash
    reports, opt-out enabled.
- id: 415fa500-6e50-488d-97ee-39ec4a9b2255
  type: endpoint
  name: Telemetry Backend
  domain: external
  description: Third-party managed telemetry provider (e.g., PostHog/Sentry).
- id: 09497db1-e4c8-43f3-8c27-ee8577b2b59f
  type: component
  name: TUI Dashboard
  domain: ux
  description: Local terminal UI dashboard providing real-time visibility into the
    dynamic DAG and parallel swarms.
- id: ea4ceb31-1218-43b9-becc-333e69e98abe
  type: entity
  name: Shared State Store
  domain: orchestration
  description: Local state tracking mechanism to feed the TUI dashboard live updates.
- id: 989b390d-aa2a-4cdc-8dc5-593b76c4b08b
  type: component
  name: Version Command
  domain: ux
  description: CLI and MCP entrypoint for safely reporting framework version before
    initialization.
- id: 908d2539-0567-41cd-9d34-260e1ef345a1
  type: entity
  name: Archive Directory
  domain: core
  description: Storage for successfully processed Product Requirement Documents (PRDs).
- id: 6506870b-b262-4f54-b6e9-43de4a873a55
  type: component
  name: PRD Archiver
  domain: core
  description: Automates moving processed PRDs from inbox/ to archive/.
- id: a6cf0410-832b-4597-a505-8fd5eb90d367
  type: entity
  name: Templates Directory
  domain: core
  description: Centralized storage for structured Markdown templates (PRD, SDD, Research
    Spike).
- id: 5a81e63d-85c7-4704-a0b1-e076367b2fd1
  type: component
  name: Artifact Templating Engine
  domain: core
  description: Programmatically generates standardized documentation artifacts from
    structured data.
- id: 685b1d12-3eed-48f6-9fa8-b8ec88a5587f
  type: component
  name: Traceability Validator
  domain: qa
  description: Automatically validates that Node IDs (GUID/Integer) consistently align
    across intention DAG, reality DAG, specs, and codebase.
- id: 2499ec97-aa53-4f54-8a55-5406403a647b
  type: component
  name: DAG Schema Migrator
  domain: core
  description: Tooling to migrate existing DAG schema states to enforce strict GUID/Integer
    node IDs and eliminate fuzzy string matching.
- id: d0307d83-371e-4bb6-925d-84a4b70beb6b
  type: component
  name: Parser Factory
  domain: core
  description: Dynamically loads the appropriate FileParser based on file extension.
- id: 9865715b-99a5-4dcb-ba92-90b03cc3cf1c
  type: component
  name: Tree-Sitter Parser
  domain: core
  description: Uses dynamically loaded Tree-Sitter grammars to parse source code into
    an AST.
- id: a937dc0f-c261-461a-975f-03950289be88
  type: component
  name: Markdown Parser
  domain: core
  description: Parses Markdown files to extract YAML frontmatter for agent configuration.
- id: 7418a0a0-0d7e-45ba-94a3-b388cfa0ec5f
  type: module
  name: AST Visitor
  domain: core
  description: Traverses parsed ASTs (or YAML data) and constructs Reality DAG Nodes.
- id: 2e8a1562-7e77-4402-992f-f461e8c7161f
  type: component
  name: Canonical GUID Extractor
  domain: core
  description: Extracts 'aio-sdlc-node' UUIDs from code comments via Tree-Sitter and
    agent frontmatters via PyYAML.
- id: 1525a991-0ffa-4f82-b5a1-b23602346ca4
  type: endpoint
  name: Health Check Endpoint
  domain: orchestration
  description: Lightweight health check endpoint for liveness probes
- id: 7bcd1683-2a10-5cbc-ab91-440ea920eaf1
  type: component
  name: Intent IR v1
  domain: product-kernel
  description: Auditable intermediate representation compiled from human intent.
  intent:
    schema_version: 1
    provenance:
    - source_type: human_statement
      reference: chat:project-review:roadmap-request
      statement: Use the AIO SDLC framework to add the recommendations to the project's
        roadmap and get the project back on track.
    - source_type: document
      reference: .aio-sdlc-recovery-roadmap.md#1-build-intent-ir-v1
      statement: Build a validated, auditable Intent IR with provenance, assumptions,
        ambiguities, confidence, evidence-bound acceptance criteria, revision history,
        ownership, and approval state.
    assumptions:
    - Intention DAG nodes remain the canonical identity boundary.
    - Legacy nodes must remain readable during framework-managed migration.
    ambiguities:
    - question: Which existing legacy Intention DAG nodes should be migrated first?
      status: open
    confidence: 0.9
    acceptance_criteria:
    - id: INTENT-IR-AC1
      statement: Intent nodes preserve source provenance, assumptions, ambiguities,
        bounded confidence, evidence requirements, revision history, ownership, and
        approval state in a versioned schema.
      required_evidence:
      - test:intent-ir-schema-validation
      - adr:0002-intent-ir-v1
    - id: INTENT-IR-AC2
      statement: Agents can create, revise, validate, and review Intent IR through
        protected framework operations without editing raw YAML.
      required_evidence:
      - test:intent-ir-protected-mutation
      - cli:dag-tool-intent
      - mcp:create-set-validate-review-intent
    revision_history:
    - revision: 1
      recorded_at: '2026-07-23T16:00:00Z'
      actor: sdlc_intake
      generator_version: aio-agentic-sdlc/0.23.0-dev
      summary: Compiled the recovery roadmap's Intent IR milestone into canonical
        intent.
    responsible_agent: sdlc_cartographer
    generator_version: aio-agentic-sdlc/0.23.0-dev
    approval:
      state: review_required
- id: 6b1b3459-38a0-5cd5-8ff4-1453f17c3d76
  type: component
  name: Explicit Evidence Model
  domain: verification
  description: Evidence levels and references that justify or limit completion claims.
  intent:
    schema_version: 1
    provenance:
    - source_type: human_statement
      reference: chat:project-review:recommendations
      statement: Separate structural presence from actual requirement satisfaction
        and explain every completion claim.
    - source_type: document
      reference: .aio-sdlc-recovery-roadmap.md#2-add-an-explicit-evidence-model
      statement: Represent declared, mapped, structurally present, tested, behaviorally
        verified, and approved as distinct evidence levels.
    assumptions:
    - Evidence references can initially be durable strings before typed evidence adapters
      are added.
    ambiguities:
    - question: Which evidence types require cryptographic hashes versus stable repository
        references?
      status: open
    confidence: 0.88
    acceptance_criteria:
    - id: EVIDENCE-AC1
      statement: Completion distinguishes declared, mapped, structural, tested, behaviorally
        verified, and approved evidence levels.
      required_evidence:
      - test:evidence-level-state-machine
      - schema:evidence-v1
    - id: EVIDENCE-AC2
      statement: Reconciliation reports cite supporting evidence and list acceptance
        criteria that remain unverified.
      required_evidence:
      - test:reconciliation-evidence-report
      - demo:traceability-report
    revision_history:
    - revision: 1
      recorded_at: '2026-07-23T16:01:00Z'
      actor: sdlc_intake
      generator_version: aio-agentic-sdlc/0.23.0-dev
      summary: Compiled the explicit evidence model milestone.
    responsible_agent: sdlc_architect
    generator_version: aio-agentic-sdlc/0.23.0-dev
    approval:
      state: review_required
- id: d64fbc3a-bdde-5672-8645-4aaa75464e46
  type: component
  name: Intent Translation Benchmark
  domain: quality
  description: Golden cases and measurable thresholds for human-intent translation.
  intent:
    schema_version: 1
    provenance:
    - source_type: human_statement
      reference: chat:project-review:recommendations
      statement: Measure the quality of translating human requests into canonical
        intent.
    - source_type: document
      reference: .aio-sdlc-recovery-roadmap.md#3-benchmark-intent-translation
      statement: Create golden requests and measure omissions, inventions, dependency
        errors, unjustified completion, stability, and correction after feedback.
    assumptions:
    - Golden cases can be reviewed and versioned without embedding model-specific
      outputs as requirements.
    ambiguities:
    - question: What initial failure thresholds are strict enough to be meaningful
        without blocking all iteration?
      status: open
    confidence: 0.84
    acceptance_criteria:
    - id: BENCHMARK-AC1
      statement: A versioned golden corpus covers requirements, constraints, dependencies,
        ambiguities, evidence, and correction after feedback.
      required_evidence:
      - fixture:intent-translation-golden-corpus
      - review:golden-case-approval
    - id: BENCHMARK-AC2
      statement: CI reports omissions, inventions, incorrect dependencies, unjustified
        completion claims, repeated-run stability, and correction quality against
        explicit thresholds.
      required_evidence:
      - test:intent-translation-benchmark
      - ci:intent-quality-thresholds
    revision_history:
    - revision: 1
      recorded_at: '2026-07-23T16:02:00Z'
      actor: sdlc_intake
      generator_version: aio-agentic-sdlc/0.23.0-dev
      summary: Compiled the intent-translation benchmark milestone.
    responsible_agent: sdlc_qa
    generator_version: aio-agentic-sdlc/0.23.0-dev
    approval:
      state: review_required
- id: cb02a996-6d3f-5610-9043-b1e768587d84
  type: component
  name: Closed-loop Reference Demo
  domain: product-validation
  description: Reproducible requirement-to-implementation-to-evidence demonstration.
  intent:
    schema_version: 1
    provenance:
    - source_type: human_statement
      reference: chat:project-review:recommendations
      statement: Prove one complete requirement-to-implementation-to-tests-to-traceability
        workflow.
    - source_type: document
      reference: .aio-sdlc-recovery-roadmap.md#4-prove-one-closed-loop
      statement: Publish one reproducible closed-loop demo with an understandable
        traceability report and human approval gate.
    assumptions:
    - A narrow security or reliability requirement is a representative first demonstration.
    ambiguities:
    - question: Which external repository or isolated fixture should host the first
        public demonstration?
      status: open
    confidence: 0.82
    acceptance_criteria:
    - id: DEMO-AC1
      statement: A fresh checkout reproduces one requirement through intent, implementation,
        tests, evidence, and approval.
      required_evidence:
      - demo:closed-loop-reproduction-script
      - test:closed-loop-integration
    - id: DEMO-AC2
      statement: The resulting traceability report is understandable without knowledge
        of framework internals.
      required_evidence:
      - artifact:human-readable-traceability-report
      - review:external-reader-usability
    revision_history:
    - revision: 1
      recorded_at: '2026-07-23T16:03:00Z'
      actor: sdlc_intake
      generator_version: aio-agentic-sdlc/0.23.0-dev
      summary: Compiled the reproducible closed-loop demonstration milestone.
    responsible_agent: sdlc_orchestrator
    generator_version: aio-agentic-sdlc/0.23.0-dev
    approval:
      state: review_required
- id: 4f6cdecf-639d-50e5-bc6d-ad71c1750000
  type: component
  name: Agent Runtime Portability
  domain: orchestration
  description: Runtime adapter boundary with validated Codex-native orchestration.
  intent:
    schema_version: 1
    provenance:
    - source_type: human_statement
      reference: chat:antigravity-to-codex-plugin
      statement: Convert the Antigravity-oriented framework into a portable Codex
        plugin and avoid dependence on one agent runtime.
    - source_type: document
      reference: .aio-sdlc-recovery-roadmap.md#5-make-agents-runtime-portable
      statement: Introduce runtime adapters, fix orchestration contracts, and validate
        Codex-native execution without changing canonical state.
    assumptions:
    - The deterministic kernel remains independent from any model provider or host-specific
      agent API.
    ambiguities:
    - question: Which second runtime should serve as the portability reference after
        Codex?
      status: open
    confidence: 0.9
    acceptance_criteria:
    - id: RUNTIME-AC1
      statement: Runtime-specific agent invocation is isolated behind a stable adapter
        contract.
      required_evidence:
      - test:runtime-adapter-contract
      - architecture:runtime-boundary
    - id: RUNTIME-AC2
      statement: Codex-native orchestration advances one selected task through its
        lifecycle without modifying canonical intent semantics.
      required_evidence:
      - test:codex-orchestration-lifecycle
      - demo:two-runtime-state-compatibility
    revision_history:
    - revision: 1
      recorded_at: '2026-07-23T16:04:00Z'
      actor: sdlc_intake
      generator_version: aio-agentic-sdlc/0.23.0-dev
      summary: Compiled the agent-runtime portability milestone.
    responsible_agent: sdlc_architect
    generator_version: aio-agentic-sdlc/0.23.0-dev
    approval:
      state: review_required
- id: 15302505-8828-525a-bebb-f72621f467a1
  type: component
  name: Cross-language Ontology Portability
  domain: reality-model
  description: Shared Python and TypeScript observation ontology with GUID traceability.
  intent:
    schema_version: 1
    provenance:
    - source_type: human_statement
      reference: chat:project-review:recommendations
      statement: Support two materially different stacks to prove the ontology is
        portable.
    - source_type: document
      reference: .aio-sdlc-recovery-roadmap.md#6-prove-ontology-portability
      statement: Add TypeScript and prove mixed Python/TypeScript observations map
        into one stable core ontology.
    assumptions:
    - TypeScript provides a materially different but widely useful second parser target.
    ambiguities:
    - question: Should the first TypeScript adapter parse the compiler API directly
        or use tree-sitter-typescript?
      status: open
    confidence: 0.86
    acceptance_criteria:
    - id: ONTOLOGY-AC1
      statement: Python and TypeScript parsers emit the same stable core node and
        edge ontology.
      required_evidence:
      - test:cross-language-ontology-contract
      - fixture:mixed-python-typescript-project
    - id: ONTOLOGY-AC2
      statement: Language-specific concepts do not leak into the core schema and GUID
        traceability remains valid across languages.
      required_evidence:
      - test:mixed-project-guid-traceability
      - review:ontology-boundary
    revision_history:
    - revision: 1
      recorded_at: '2026-07-23T16:05:00Z'
      actor: sdlc_intake
      generator_version: aio-agentic-sdlc/0.23.0-dev
      summary: Compiled the cross-language ontology portability milestone.
    responsible_agent: sdlc_cartographer
    generator_version: aio-agentic-sdlc/0.23.0-dev
    approval:
      state: review_required
- id: 82579715-d088-51ac-999f-4a95235b561c
  type: component
  name: Product Hardening
  domain: delivery
  description: Stable installation, contracts, CI, licensing, recovery, and dogfooding
    evidence.
  intent:
    schema_version: 1
    provenance:
    - source_type: human_statement
      reference: chat:project-review:recommendations
      statement: Stabilize installation, contracts, CI, documentation, licensing,
        and externally understandable proof before positioning this as an ecosystem.
    - source_type: document
      reference: .aio-sdlc-recovery-roadmap.md#7-product-hardening
      statement: Make CI, CLI, MCP, plugin installation, release contracts, licensing,
        dogfooding reports, and recovery procedures reproducible.
    assumptions:
    - Product hardening follows proof of the core intent and evidence loop rather
      than preceding it.
    ambiguities:
    - question: Should the long-term distribution use an OSI-approved core, dual licensing,
        or a source-available commercial model?
      status: open
    confidence: 0.9
    acceptance_criteria:
    - id: HARDENING-AC1
      statement: A clean environment can install and validate the CLI, MCP server,
        and Codex plugin through stable documented contracts.
      required_evidence:
      - ci:clean-install-matrix
      - test:plugin-install-smoke
      - artifact:release-contract-documentation
    - id: HARDENING-AC2
      statement: The repository contains a deliberate license, recovery procedures,
        and evidence-backed dogfooding reports understandable to external adopters.
      required_evidence:
      - file:LICENSE
      - doc:recovery-procedure
      - report:dogfooding-evidence
    revision_history:
    - revision: 1
      recorded_at: '2026-07-23T16:06:00Z'
      actor: sdlc_intake
      generator_version: aio-agentic-sdlc/0.23.0-dev
      summary: Compiled the product hardening milestone.
    responsible_agent: sdlc_devops
    generator_version: aio-agentic-sdlc/0.23.0-dev
    approval:
      state: review_required
