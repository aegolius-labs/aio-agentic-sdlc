metadata:
  name: AIO Agentic SDLC
  version: 1.0.0
nodes:
- id: 4d76717e-55cd-4768-b05e-06a3cce1128b
  type: system
  name: AIO Agentic SDLC System
  domain: sdlc
  description: Dual-DAG reconciliation engine for autonomous software development
- id: 54b91d55-08fe-48df-be35-445be7cd1e46
  type: container
  name: Agentic Orchestrator Loop
  domain: orchestration
  description: Main orchestrator binding the calculated Diff to the SDLC Pipeline
- id: cb432b58-db06-4d49-a6ab-c11c9e86bcc2
  type: container
  name: DAG Engine Container
  domain: core
  description: Core container for DAG management and difference calculation
- id: f4d2f082-e822-4aa6-b74d-38b14bd84c87
  type: module
  name: QA Swarm Orchestrator
  domain: qa
  description: Manages a swarm of specialized QA subagents to ensure bulletproof code
    generation
- id: fa35fa8a-b6b5-40ca-9080-b31421117e37
  type: component
  name: Diffing Engine
  domain: core
  description: Calculates the Diff by superimposing Intention DAG over Reality DAG
- id: 0fea8fea-9a23-404b-a16b-a9c9c3990e1b
  type: component
  name: Reality DAG Generator
  domain: core
  description: Generates an accurate, real-time graph of the existing codebase
- id: 9066081a-24ea-4937-9f47-5ba87e09f731
  type: component
  name: Parallel Task Runner
  domain: orchestration
  description: Spawns concurrent subagents for unblocked items in the backlog, handling
    DAG concurrency and merge conflicts
- id: 7b029abd-1321-4cd7-9c1d-9e9f7b62046c
  type: entity
  name: Operational Modes Config
  domain: orchestration
  description: Configuration for approval gates vs bypass mode for continuous delivery
- id: 22822d50-4438-4b48-821f-451933f557dd
  type: agent
  name: SDLC Intake Agent
  domain: ux
  description: Chats with the user, distills ideas into PRDs, and writes them to the
    inbox/ directory safely without writing execution code
- id: 07e7e16c-c4d7-4f59-ac98-5d33599f0270
  type: agent
  name: SDLC Architect Agent
  domain: core
  description: Reads PRDs from inbox/, performs technical research, maps new architectural
    nodes into intention-dag.yaml, and moves processed PRDs to specs/.
- id: d4049c0c-4bf8-4d13-94b6-5e5410190f49
  type: entity
  name: Inbox Directory
  domain: ux
  description: Directory containing new, unprocessed Product Requirement Documents
    (PRDs).
- id: f24b7477-032b-4f93-abcf-9b1c70627900
  type: component
  name: CLI Entrypoint
  domain: ux
  description: Exposes plan and apply commands to run the DiffingEngine and Orchestrator
    Loop
- id: b4e6a8f3-a7f7-489e-8192-6d969a8fa6dd
  type: entity
  name: Subagent Output Templates
  domain: orchestration
  description: Structured reporting templates for each subagent so the Orchestrator
    can compile a clean, human-readable summary of the entire parallel session.
- id: 37c790a3-75a2-4533-9384-889a06a9e573
  type: component
  name: Agent Format Migrator
  domain: core
  description: Tooling to scan .agents/agents/ for legacy agent.json and system_prompt.md
    files, consolidate them into agent.md with YAML frontmatter, and delete the legacy
    files.
- id: 277fe548-6b99-4711-a89c-b681d262f820
  type: entity
  name: Unified Agent Definitions
  domain: core
  description: Standardized agent definitions using the unified agent.md format with
    YAML frontmatter and markdown instructions.
- id: 64b5afea-5e38-4659-82bb-662be3f3458e
  type: entity
  name: Unified Configuration File
  domain: core
  description: Primary configuration schema (.aio-sdlc.json), replacing legacy external
    trackers.
- id: 45b34e7b-3c77-48f9-9b7c-8ec541243767
  type: entity
  name: Agent Personas Config
  domain: ux
  description: Configuration for custom names and personalities of user-facing agents,
    injected into prompts.
- id: 900f5127-2c5e-46e1-890e-991ef7b27043
  type: component
  name: Commercial Licensing Enforcer
  domain: security
  description: Validates commercial usage via license keys against an external Merchant
    of Record API.
- id: 3ea4e322-7259-4f15-99c8-cbee950afe00
  type: component
  name: EULA & Privacy Prompt
  domain: ux
  description: Clickwrap prompt for first-time users to accept the Non-Commercial
    terms and Privacy Policy.
- id: da3ee4cb-c37b-40f1-a1c4-93c24822e597
  type: endpoint
  name: Merchant of Record API
  domain: security
  description: External API (e.g., Lemon Squeezy/Paddle) to validate keys and manage
    software monetization.
- id: 10d4c0ba-de03-49ac-ae0e-41048fd557ed
  type: component
  name: Daemon Watcher
  domain: orchestration
  description: Long-running background process that monitors the inbox directory for
    PRDs and triggers pipelines.
- id: f1009cfe-9cde-4260-9235-72886d71fa94
  type: container
  name: MCP Server
  domain: orchestration
  description: Primary MCP-First interface for agents, exposing dynamic resources
    (e.g., the diff backlog) and core tools.
- id: c2d35f1b-2d6c-43db-9c54-91f1f5d125f2
  type: entity
  name: Specs Directory
  domain: core
  description: Directory storing deterministic Markdown Software Design Documents
    natively bound to the DAG.
- id: 48295997-8b54-4168-bccc-30d49ae766d8
  type: agent
  name: Implementer Agent
  domain: core
  description: Swarm agent that implements SDDs, returning Variance Reports if technical
    roadblocks occur.
- id: 483abc2c-fab5-460f-9cd7-47bc25e0d3b3
  type: component
  name: Variance Report Router
  domain: orchestration
  description: Captures spec pushback from implementers and routes it to the Architect
    for dynamic SDD revision.
- id: 40566eb0-0911-40cc-a1df-9ff6697734c8
  type: component
  name: Approval Gate
  domain: orchestration
  description: Pauses pipeline before merging for user review, bypassable via configuration.
- id: 5a916efe-75ec-4b0d-a8de-79fcd8e5035c
  type: component
  name: Conflict Resolution Manager
  domain: orchestration
  description: Detects and resolves DAG and file-level merge conflicts across parallel
    execution tasks.
- id: 54a600df-269a-42b2-a7e1-62f2a6687169
  type: agent
  name: Specialized QA Agents
  domain: qa
  description: Swarm of specialized subagents (A11Y, Security, API Contracts, etc.)
    invoked for domain-specific checks.
- id: bcb5855b-46cf-475c-bf5c-5267a124e58a
  type: agent
  name: SDLC Researcher Agent
  domain: core
  description: Dedicated subagent spawned by the Architect to perform deep technical
    research and draft spikes.
- id: 6ff0c1eb-b872-4036-987b-20988d9b380f
  type: entity
  name: Research Spikes Directory
  domain: core
  description: Output location for Research Spikes generated by the Researcher Agent.
- id: b9c4304e-70cd-47de-a94c-dcfbbca66335
  type: component
  name: Session Report Compiler
  domain: orchestration
  description: Compiles structured subagent templates into unified Markdown session
    summaries.
- id: a187faf6-c03a-4657-9ac6-9319e51499b8
  type: component
  name: Telemetry Module
  domain: core
  description: Lightweight client for collecting anonymized usage metrics and crash
    reports, opt-out enabled.
- id: 415fa500-6e50-488d-97ee-39ec4a9b2255
  type: endpoint
  name: Telemetry Backend
  domain: external
  description: Third-party managed telemetry provider (e.g., PostHog/Sentry).
- id: 09497db1-e4c8-43f3-8c27-ee8577b2b59f
  type: component
  name: TUI Dashboard
  domain: ux
  description: Local terminal UI dashboard providing real-time visibility into the
    dynamic DAG and parallel swarms.
- id: ea4ceb31-1218-43b9-becc-333e69e98abe
  type: entity
  name: Shared State Store
  domain: orchestration
  description: Local state tracking mechanism to feed the TUI dashboard live updates.
- id: 989b390d-aa2a-4cdc-8dc5-593b76c4b08b
  type: component
  name: Version Command
  domain: ux
  description: CLI and MCP entrypoint for safely reporting framework version before
    initialization.
- id: 908d2539-0567-41cd-9d34-260e1ef345a1
  type: entity
  name: Archive Directory
  domain: core
  description: Storage for successfully processed Product Requirement Documents (PRDs).
- id: 6506870b-b262-4f54-b6e9-43de4a873a55
  type: component
  name: PRD Archiver
  domain: core
  description: Automates moving processed PRDs from inbox/ to archive/.
- id: a6cf0410-832b-4597-a505-8fd5eb90d367
  type: entity
  name: Templates Directory
  domain: core
  description: Centralized storage for structured Markdown templates (PRD, SDD, Research
    Spike).
- id: 5a81e63d-85c7-4704-a0b1-e076367b2fd1
  type: component
  name: Artifact Templating Engine
  domain: core
  description: Programmatically generates standardized documentation artifacts from
    structured data.
- id: 685b1d12-3eed-48f6-9fa8-b8ec88a5587f
  type: component
  name: Traceability Validator
  domain: qa
  description: Automatically validates that Node IDs (GUID/Integer) consistently align
    across intention DAG, reality DAG, specs, and codebase.
- id: 2499ec97-aa53-4f54-8a55-5406403a647b
  type: component
  name: DAG Schema Migrator
  domain: core
  description: Tooling to migrate existing DAG schema states to enforce strict GUID/Integer
    node IDs and eliminate fuzzy string matching.
- id: d0307d83-371e-4bb6-925d-84a4b70beb6b
  type: component
  name: Parser Factory
  domain: core
  description: Dynamically loads the appropriate FileParser based on file extension.
- id: 9865715b-99a5-4dcb-ba92-90b03cc3cf1c
  type: component
  name: Tree-Sitter Parser
  domain: core
  description: Uses dynamically loaded Tree-Sitter grammars to parse source code into
    an AST.
- id: a937dc0f-c261-461a-975f-03950289be88
  type: component
  name: Markdown Parser
  domain: core
  description: Parses Markdown files to extract YAML frontmatter for agent configuration.
- id: 7418a0a0-0d7e-45ba-94a3-b388cfa0ec5f
  type: module
  name: AST Visitor
  domain: core
  description: Traverses parsed ASTs (or YAML data) and constructs Reality DAG Nodes.
- id: 2e8a1562-7e77-4402-992f-f461e8c7161f
  type: component
  name: Canonical GUID Extractor
  domain: core
  description: Extracts 'aio-sdlc-node' UUIDs from code comments via Tree-Sitter and
    agent frontmatters via PyYAML.
- id: 1525a991-0ffa-4f82-b5a1-b23602346ca4
  type: endpoint
  name: Health Check Endpoint
  domain: orchestration
  description: Lightweight health check endpoint for liveness probes
