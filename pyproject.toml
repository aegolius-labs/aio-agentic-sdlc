[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentic-backlog"
version = "0.1.0"
description = "Deterministic 3D Matrix Backlog Manager for Agentic Workflows"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "PolyForm Noncommercial License 1.0.0" }
authors = [
  { name="aegolius-labs" },
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
]
dependencies = []

[project.urls]
"Homepage" = "https://github.com/aegolius-labs/agentic-backlog-cli"
"Bug Tracker" = "https://github.com/aegolius-labs/agentic-backlog-cli/issues"

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
agentic-backlog = "agentic_backlog.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
