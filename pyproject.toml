[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentic-backlog"
version = "0.1.0"
description = "Deterministic 3D Matrix Backlog Manager for Agentic Workflows"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "PolyForm Noncommercial License 1.0.0" }
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
agentic-backlog = "agentic_backlog.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
