[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentic-backlog"
version = "0.2.0"
description = "Deterministic 3D Matrix Backlog Manager for Agentic Workflows"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "PolyForm Noncommercial License 1.0.0" }
authors = [
  { name="aegolius-labs" },
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
]
dependencies = ["mcp>=1.0.0", "requests>=2.31.0"]

[project.urls]
"Homepage" = "https://github.com/aegolius-labs/agentic-backlog-cli"
"Bug Tracker" = "https://github.com/aegolius-labs/agentic-backlog-cli/issues"

[project.optional-dependencies]
dev = ["pytest>=9.1.0"]

[project.scripts]
agentic-backlog = "agentic_backlog.cli:main"
agb = "agentic_backlog.cli:main"
agentic-backlog-mcp = "agentic_backlog.mcp_server:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
